<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Today's flag puzzle, same for everyone. How many can you find?" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.yetanotherquiz.com/daily/" />
    <meta property="og:title" content="Yet Another Quiz: Today's Flag Puzzle" />
    <meta property="og:description" content="Today's flag puzzle, same for everyone. How many can you find?" />
    <meta property="og:image" content="https://www.yetanotherquiz.com/og-banner.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Yet Another Quiz wordmark above a row of six flags: Canada, Brazil, Poland, South Africa, Turkey, Japan." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Yet Another Quiz: Today's Flag Puzzle" />
    <meta name="twitter:description" content="Today's flag puzzle, same for everyone. How many can you find?" />
    <meta name="twitter:image" content="https://www.yetanotherquiz.com/og-banner.png" />
    <meta name="twitter:image:alt" content="Yet Another Quiz wordmark above a row of six flags: Canada, Brazil, Poland, South Africa, Turkey, Japan." />
    <link rel="canonical" href="https://yetanotherquiz.com/daily/" />
    <link rel="preload" href="../flags/countries.json?v=__BUILD__" as="fetch" type="application/json" crossorigin />
    <link rel="preload" href="https://styetanotherquiz.blob.core.windows.net/catalog/puzzles.json" as="fetch" type="application/json" crossorigin />
    <title data-i18n="daily.title">Yet Another Quiz</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="../findFlag/index.css?v=__BUILD__" />
    <link rel="stylesheet" href="index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="lang-toggle" id="lang-toggle" href="#"></a>
    <script>
      // Sync lang-flag paint — sets data-current before any module imports
      // start, so the toggle shows the flag with first paint instead of
      // after the i18n.js graph resolves. Pinned by chrome.test.js.
      (function () {
        var lang = null;
        try {
          var s = localStorage.getItem('gridgame.lang');
          if (s === 'en' || s === 'pl') lang = s;
        } catch (e) {}
        if (!lang) {
          var n = (navigator.language || '').toLowerCase().split('-')[0];
          lang = n === 'pl' ? 'pl' : 'en';
        }
        document.getElementById('lang-toggle').setAttribute('data-current', lang);
      })();
    </script>
    <a class="flags-link" href="../flagsdata/" aria-label="Browse flags" title="Browse flags" data-i18n-attr="aria-label:menu.flagsData,title:menu.flagsData"><span class="flags-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      data-label-open="Open menu"
      data-label-close="Close menu"
      data-i18n-attr="aria-label:menu.open,data-label-open:menu.open,data-label-close:menu.close"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? this.dataset.labelOpen : this.dataset.labelClose);
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li><a href="./" aria-current="page" data-i18n="daily.todaysPuzzle">Today's puzzle</a></li>
        <li><a href="archive.html" data-i18n="daily.archive">Previous puzzles</a></li>
        <li class="menu-divider"><a class="menu-coffee" href="https://suppi.pl/jgrzegrzolka" target="_blank" rel="noopener noreferrer" data-i18n="coffee">Buy me a coffee</a></li>
      </ul>
    </nav>

    <section id="daily-state" class="daily-state" hidden></section>

    <section id="game" hidden>
      <header class="find-header daily-header">
        <span class="daily-n" id="daily-n"></span>
        <span class="find-cat" id="find-cat"></span>
        <span class="find-count" id="find-count">0 / 0</span>
      </header>
      <div class="find-input-wrap">
        <input
          type="text"
          class="find-input"
          id="find-input"
          inputmode="text"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="Type a country name…"
          data-i18n-attr="placeholder:findFlag.typeCountryName"
        />
        <ul class="find-suggestions" id="find-suggestions" hidden></ul>
      </div>
      <p class="daily-desc" id="daily-desc" hidden></p>
      <ul class="find-found" id="find-found"></ul>
      <div class="actions-row">
        <button type="button" class="row-cta" id="give-up" data-i18n="game.giveUp">Give up</button>
        ·
        <a id="prev-puzzles-link" href="archive.html" data-i18n="daily.archive">Previous puzzles</a>
        ·
        <a href="../" data-i18n="menu.home">Home</a>
      </div>
    </section>

    <dialog id="zoom">
      <img alt="" />
      <p></p>
      <p class="zoom-note" hidden></p>
    </dialog>

    <!-- Invisible Cloudflare Turnstile widget. Mounted lazily by
         daily/turnstileClient.js at finish time. Site key is public. -->
    <div id="turnstile-widget" aria-hidden="true"></div>

    <section id="result" hidden>
      <p class="final-score" id="final-score-line">
        <span id="final-score-prefix" data-i18n="findFlag.youFound">You found</span><span id="final-score-fraction"> <span id="final-found">0</span> / <span id="final-total">0</span></span>
      </p>
      <!-- Personal stats slot: score + streak + share. Paints
           immediately when the result renders — no fetch needed.
           Sits above Found so the player's numbers are the first
           thing they see; the community block below Missed handles
           the comparison context (average, rails, caption). -->
      <section id="daily-personal-stats" class="daily-stats" hidden></section>
      <h2 class="result-section-title" id="found-title" hidden data-i18n="findFlag.found">Found:</h2>
      <ul class="find-result-found" id="find-result-found"></ul>
      <h2 class="result-section-title" id="missed-title" hidden data-i18n="findFlag.missed">Missed:</h2>
      <ul class="find-missed" id="find-missed"></ul>
      <!-- Community stats slot: average + loading dots. Below Missed
           so it reads as "how others did" after the player sees their
           own breakdown. -->
      <section id="daily-stats" class="daily-stats" hidden></section>
      <section id="daily-extra-stats" class="daily-extra-stats" hidden></section>
      <!-- Caption explaining the per-tile %s. Sits at the bottom of the
           result panel (just above the action links) so the legend
           appears beneath the flags it describes, after the player has
           scanned both Most-recognised / Most-common-mistake rails. -->
      <p id="daily-caption" class="daily-stats-caption" hidden></p>
      <p class="result-links">
        <a id="result-prev-puzzles-link" href="archive.html" data-i18n="daily.archive">Previous puzzles</a>
        ·
        <a id="play-again" href="#" data-i18n="game.playAgain">Play again</a>
        ·
        <a href="../" data-i18n="menu.home">Home</a>
      </p>
    </section>

    <script type="module">
      import { bootDaily } from './page.js';
      import { bootI18n, wireLangToggle } from '../i18n.js';
      import { disableBurgerIfEmpty, wireBurgerDismiss, mountNicknameMenuItem } from '../common.js';
      bootI18n('../').then((lang) => {
        // Soft-reload mode keeps partial game progress (typed guesses,
        // input text, scroll, found tiles) intact across a language
        // switch. bootDaily() registers a `langchanged` listener that
        // re-localizes the suggestion matcher and re-paints the running
        // game on each switch.
        wireLangToggle(lang, undefined, { softReload: true, base: '../' });
        disableBurgerIfEmpty(
          document.querySelector('.burger'),
          document.querySelector('#burger-panel .menu'),
        );
        bootDaily();
        wireBurgerDismiss();
        mountNicknameMenuItem({
          rootEl: document.querySelector('#burger-panel .menu'),
          profileHref: '../profile/',
        });
      });
    </script>
  </body>
</html>
