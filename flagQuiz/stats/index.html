<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" href="../../flags/countries.json?v=__BUILD__" as="fetch" type="application/json" crossorigin />
    <title data-i18n="quiz.statsTitle">Yet Another Quiz — Flag Quiz Stats</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="../index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="lang-toggle" id="lang-toggle" href="#"></a>
    <script>
      // Sync lang-flag paint — sets data-current before any module imports
      // start, so the toggle shows the flag with first paint instead of
      // after the i18n.js graph resolves. Pinned by chrome.test.js.
      (function () {
        var lang = null;
        try {
          var s = localStorage.getItem('gridgame.lang');
          if (s === 'en' || s === 'pl') lang = s;
        } catch (e) {}
        if (!lang) {
          var n = (navigator.language || '').toLowerCase().split('-')[0];
          lang = n === 'pl' ? 'pl' : 'en';
        }
        document.getElementById('lang-toggle').setAttribute('data-current', lang);
      })();
    </script>
    <a class="flags-link" href="../../flagsdata/" aria-label="Browse flags" title="Browse flags" data-i18n-attr="aria-label:menu.flagsData,title:menu.flagsData"><span class="flags-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      data-label-open="Open menu"
      data-label-close="Close menu"
      data-i18n-attr="aria-label:menu.open,data-label-open:menu.open,data-label-close:menu.close"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? this.dataset.labelOpen : this.dataset.labelClose);
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu" id="quiz-menu"></ul>
    </nav>
    <ul class="stats" id="stats"></ul>
    <div class="actions-row">
      <a href="../../" data-i18n="menu.home">Home</a>
    </div>
    <script type="module">
      import {
        VARIANTS,
        availableModes,
        formatTime,
        loadBest,
        bestKey,
        scoreColor,
        isTimedMode,
        accuracyRatio,
        isQuizIncludeAll,
        shouldShowBestTime,
        formatBestScoreLabel,
      } from '../../flags/quiz.js';
      import { flagsGamePool } from '../../flags/group.js';
      import { bootI18n, wireLangToggle, t } from '../../i18n.js';
      import { wireBurgerDismiss, mountNicknameMenuItem } from '../../common.js';
      import { buildQuizMenu } from '../menu.js';

      const includeAll = isQuizIncludeAll();
      const statsEl = document.getElementById('stats');

      // Mode-icon SVGs replace the per-chip text label (the PL "wszystkie"
      // for `all` mode was overflowing the 340px phone slot — and the
      // mode is the chip's section, not a piece of data). Stopwatch =
      // 60s, 2×2 grid = "all" (the whole set, every flag). aria-hidden
      // on the SVGs because the chip's aria-label carries the spoken
      // mode name for screen readers. Inline as constants in this
      // module — second consumer (chips + the existing chunky-pixel
      // stopwatch in achievements.js) would justify promoting to a
      // shared icon module; until then the duplication is one chip.
      const MODE_ICON_SVG = {
        '60s':
          '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" ' +
          'stroke="currentColor" stroke-width="2" stroke-linecap="round" ' +
          'aria-hidden="true">' +
            '<circle cx="12" cy="14" r="7"/>' +
            '<line x1="12" y1="14" x2="12" y2="9"/>' +
            '<line x1="9" y1="3" x2="15" y2="3"/>' +
            '<line x1="12" y1="3" x2="12" y2="7"/>' +
          '</svg>',
        // Bulleted-list icon — rounded square outline, three bullet rings
        // beside three rows. Matches the reference Jan shared and reads
        // as "play through the whole list" cleanly at chip scale.
        all:
          '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" ' +
          'stroke="currentColor" stroke-width="2" stroke-linecap="round" ' +
          'stroke-linejoin="round" aria-hidden="true">' +
            '<rect x="3" y="3" width="18" height="18" rx="4"/>' +
            '<circle cx="8" cy="8"  r="1.2"/>' +
            '<circle cx="8" cy="12" r="1.2"/>' +
            '<circle cx="8" cy="16" r="1.2"/>' +
            '<line x1="11.5" y1="8"  x2="17" y2="8"/>' +
            '<line x1="11.5" y1="12" x2="17" y2="12"/>' +
            '<line x1="11.5" y1="16" x2="17" y2="16"/>' +
          '</svg>',
      };

      // Wait for i18n so renderStats can use translated variant labels and
      // the "Play" CTA without a load-order race.
      bootI18n('../../').then((lang) => {
        // Soft-reload mode keeps the stats grid in place across a
        // language switch — the langchanged listener below rebuilds
        // the menu + stats chips with fresh translations.
        wireLangToggle(lang, undefined, { softReload: true, base: '../../' });
        wireBurgerDismiss();
        return fetch('../../flags/countries.json')
          .then((r) => r.json())
          .then((raw) => {
            const all = flagsGamePool(raw, includeAll);
            const menuEl = document.getElementById('quiz-menu');
            const rebuildMenu = () => {
              menuEl.innerHTML = '';
              buildQuizMenu(menuEl, all, {
                relativeBase: '../',
                currentVariantKey: null,
                statsCurrent: true,
              });
              // The nickname menu item is re-inserted after every rebuild —
              // `buildQuizMenu` wipes innerHTML first, so an earlier mount
              // would be lost on the first langchanged.
              mountNicknameMenuItem({
                rootEl: menuEl,
                profileHref: '../../profile/',
              });
            };
            rebuildMenu();
            renderStats(raw);
            document.addEventListener('langchanged', () => {
              rebuildMenu();
              statsEl.innerHTML = '';
              renderStats(raw);
            });
          })
          .catch((err) => {
            document.body.textContent = `${t('game.failedToLoad', 'Failed to load:')} ${err.message}`;
          });
      });

      /**
       * Build one chip — a tappable link back to the quiz at this
       * variant/mode. When a best score is stored, the chip shows
       * mode · score% · time with the score tinted by scoreColor.
       * When the slot is untouched it shows mode · Play, faded, with
       * a CTA hint — keeps the row from looking incomplete.
       */
      function modeChip(key, mode, target) {
        // Stats lives at /flagQuiz/stats/, quiz at /flagQuiz/, so we
        // need to step one level up when linking back to the quiz.
        const a = document.createElement('a');
        a.href = `../?v=${key}&n=${mode}`;
        a.className = 'stats-chip';

        // Icon-only mode badge; the visible word lived inside the chip
        // pre-fix and overflowed in PL ("wszystkie" at 12px uppercase).
        // SR-only span keeps the spoken label, `title` is the desktop
        // hover hint.
        const modeLabel = t(`quiz.mode.${mode}`, mode);
        a.title = modeLabel;
        const modeEl = document.createElement('span');
        modeEl.className = 'stats-chip-mode';
        modeEl.innerHTML = MODE_ICON_SVG[mode] || '';
        const srLabel = document.createElement('span');
        srLabel.className = 'sr-only';
        srLabel.textContent = modeLabel;
        modeEl.appendChild(srLabel);
        a.appendChild(modeEl);

        const best = loadBest(localStorage, bestKey(key, mode, includeAll));
        if (best) {
          const score = document.createElement('span');
          score.className = 'stats-chip-score';
          score.textContent = formatBestScoreLabel(mode, best, target);
          // Tint by ratio in both directions: timed mode = correct/total
          // (higher is greener), untimed = mistakes/total (lower is greener).
          score.style.color = isTimedMode(mode)
            ? scoreColor(best.score / target)
            : scoreColor(accuracyRatio(best.score, target));
          a.appendChild(score);
          if (shouldShowBestTime(mode, best)) {
            const time = document.createElement('span');
            time.className = 'stats-chip-time';
            time.textContent = formatTime(best.time);
            a.appendChild(time);
          }
        } else {
          a.classList.add('stats-chip-unplayed');
          const cta = document.createElement('span');
          cta.className = 'stats-chip-cta';
          cta.textContent = t('quiz.play', 'Play');
          a.appendChild(cta);
        }
        return a;
      }

      function renderStats(raw) {
        const all = flagsGamePool(raw, includeAll);
        for (const [key, variant] of Object.entries(VARIANTS)) {
          const variantPool = all.filter(variant.filter);
          const modes = availableModes(variantPool.length);
          if (modes.length === 0) continue;
          const li = document.createElement('li');
          li.className = 'stats-row';

          const label = document.createElement('span');
          label.className = 'stats-label';
          label.textContent = t(`variant.${key}`, variant.label);
          li.appendChild(label);

          const chips = document.createElement('span');
          chips.className = 'stats-chips';
          for (const mode of modes) chips.appendChild(modeChip(key, mode, variantPool.length));
          li.appendChild(chips);

          statsEl.appendChild(li);
        }
      }
    </script>
  </body>
</html>
