<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" href="../../flags/countries.json" as="fetch" type="application/json" crossorigin />
    <title data-i18n="quiz.statsTitle">Flag Quiz — Your Stats</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="../index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="back" href="../../" aria-label="Home" data-i18n-attr="aria-label:back"><span class="home-icon" aria-hidden="true"></span></a>
    <a class="lang-toggle" id="lang-toggle" href="#"></a>
    <a class="coffee" href="https://suppi.pl/jgrzegrzolka" target="_blank" rel="noopener noreferrer" aria-label="Buy me a coffee" title="Buy me a coffee" data-i18n-attr="aria-label:coffee,title:coffee"><span class="coffee-icon" aria-hidden="true"></span></a>
    <a class="flags-link" href="../../flagsdata/" aria-label="Browse flags" title="Browse flags" data-i18n-attr="aria-label:menu.flagsData,title:menu.flagsData"><span class="flags-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      data-label-open="Open menu"
      data-label-close="Close menu"
      data-i18n-attr="aria-label:menu.open,data-label-open:menu.open,data-label-close:menu.close"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? this.dataset.labelOpen : this.dataset.labelClose);
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li>
          <label class="scope-toggle">
            <span class="scope-toggle-text" data-i18n="menu.includeTerritories">Include territories &amp; other flags</span>
            <span class="scope-toggle-switch">
              <input type="checkbox" id="stats-scope-toggle" />
              <span class="scope-toggle-track" aria-hidden="true"><span class="scope-toggle-thumb"></span></span>
            </span>
          </label>
        </li>
      </ul>
    </nav>
    <ul class="stats" id="stats"></ul>
    <script type="module">
      import {
        VARIANTS,
        MODES,
        availableModes,
        formatTime,
        loadBest,
        bestKey,
        scoreColor,
        isTimedMode,
        accuracyRatio,
        isQuizIncludeAll,
        setQuizIncludeAll,
      } from '../../flags/quiz.js';
      import { flagsGamePool } from '../../flags/group.js';
      import { bootI18n, wireLangToggle, t } from '../../i18n.js';
      import { wireBurgerDismiss } from '../../common.js?v=__BUILD__';

      const includeAll = isQuizIncludeAll();
      const statsEl = document.getElementById('stats');

      const toggleEl = /** @type {HTMLInputElement} */ (document.getElementById('stats-scope-toggle'));
      toggleEl.checked = includeAll;
      toggleEl.addEventListener('change', () => {
        setQuizIncludeAll(localStorage, toggleEl.checked);
        // Let the slide animation finish so the user sees the toggle move
        // before the page reloads.
        setTimeout(() => window.location.reload(), 350);
      });

      // Wait for i18n so renderStats can use translated variant labels and
      // the "Play" CTA without a load-order race.
      bootI18n('../../').then((lang) => {
        wireLangToggle(lang);
        wireBurgerDismiss();
        return fetch('../../flags/countries.json')
          .then((r) => r.json())
          .then(renderStats)
          .catch((err) => {
            document.body.textContent = `${t('game.failedToLoad', 'Failed to load:')} ${err.message}`;
          });
      });

      /**
       * Build one chip — a tappable link back to the quiz at this
       * variant/mode. When a best score is stored, the chip shows
       * mode · score% · time with the score tinted by scoreColor.
       * When the slot is untouched it shows mode · Play, faded, with
       * a CTA hint — keeps the row from looking incomplete.
       */
      function modeChip(key, mode, target) {
        // Stats lives at /flagQuiz/stats/, quiz at /flagQuiz/, so we
        // need to step one level up when linking back to the quiz.
        const a = document.createElement('a');
        a.href = `../?v=${key}&n=${mode}`;
        a.className = 'stats-chip';

        const modeEl = document.createElement('span');
        modeEl.className = 'stats-chip-mode';
        modeEl.textContent = t(`quiz.mode.${mode}`, mode);
        a.appendChild(modeEl);

        const best = loadBest(localStorage, bestKey(key, mode, includeAll));
        if (best) {
          const score = document.createElement('span');
          score.className = 'stats-chip-score';
          // Per-mode score semantics:
          //   60s: best.score = flags answered correctly. Show as
          //        score/target with a green→amber tint by ratio, same
          //        shape findFlag/stats uses for its "found / total".
          //   all: best.score = mistakes count (lower is better). Show
          //        the raw mistakes number — a "/target" suffix here
          //        would read as "5 out of 45 what?" since target is
          //        the pool size, not the cap on mistakes.
          if (isTimedMode(mode)) {
            score.textContent = `${best.score}/${target}`;
            score.style.color = scoreColor(best.score / target);
          } else {
            const mistakes = best.score;
            score.textContent = String(mistakes);
            score.style.color = scoreColor(accuracyRatio(mistakes, target));
          }
          a.appendChild(score);
          // Time policy: for timed modes the budget is almost always
          // exhausted (round runs out the clock at exactly budgetMs),
          // so a "1:00.000" time tells the player nothing they don't
          // already know from the mode label. Show it only on the brag
          // case where the pool was finished BEFORE the clock ran out —
          // mirrors flagQuiz/page.js's end-of-round logic. For untimed
          // (all) mode every time is meaningful.
          const def = MODES[mode];
          const budgetMs = def && def.kind === 'timed' ? def.budgetMs : 0;
          const showTime = !isTimedMode(mode) || best.time < budgetMs;
          if (showTime) {
            const time = document.createElement('span');
            time.className = 'stats-chip-time';
            time.textContent = formatTime(best.time);
            a.appendChild(time);
          }
        } else {
          a.classList.add('stats-chip-unplayed');
          const cta = document.createElement('span');
          cta.className = 'stats-chip-cta';
          cta.textContent = t('quiz.play', 'Play');
          a.appendChild(cta);
        }
        return a;
      }

      function renderStats(raw) {
        const all = flagsGamePool(raw, includeAll);
        for (const [key, variant] of Object.entries(VARIANTS)) {
          const variantPool = all.filter(variant.filter);
          const modes = availableModes(variantPool.length);
          if (modes.length === 0) continue;
          const li = document.createElement('li');
          li.className = 'stats-row';

          const label = document.createElement('span');
          label.className = 'stats-label';
          label.textContent = t(`variant.${key}`, variant.label);
          li.appendChild(label);

          const chips = document.createElement('span');
          chips.className = 'stats-chips';
          for (const mode of modes) chips.appendChild(modeChip(key, mode, variantPool.length));
          li.appendChild(chips);

          statsEl.appendChild(li);
        }
      }
    </script>
  </body>
</html>
