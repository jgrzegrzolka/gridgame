<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Flag Quiz</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="index.css?v=__BUILD__" />
  </head>
  <body>
    <div class="progress-bar" id="progress-bar"></div>
    <a class="back" id="back" href="../" aria-label="Home"><span class="home-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? 'Open menu' : 'Close menu');
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu" id="quiz-menu"></ul>
    </nav>
    <div id="game" hidden>
      <p class="play-timer">
        <span class="play-mode" id="play-mode"></span>
        <span class="mode-toggle" id="mode-toggle"></span>
        <span id="play-time">0:00.000</span>
      </p>
      <p class="country-name" id="country-name">Loading…</p>
      <div class="choices" id="choices"></div>
      <p class="feedback" id="feedback"></p>
      <div class="give-up-row">
        <button type="button" class="give-up" id="give-up">Give up</button>
      </div>
    </div>
    <section id="result" hidden>
      <p class="final-score" id="final-score-line">
        Final score: <span id="final-score">0</span>
      </p>
      <p class="time" id="time"></p>
      <p class="best" id="best"></p>
      <p class="result-links">
        <a id="play-again" href="#">Play again</a>
      </p>
    </section>
    <script type="module">
      import { bootFlagQuiz } from './page.js?v=__BUILD__';
      bootFlagQuiz();
    </script>
  </body>
</html>
