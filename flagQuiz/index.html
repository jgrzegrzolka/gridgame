<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Country flag quiz: name flags from all 195+ countries. 60-second timed mode or pick a continent. Diacritic-tolerant name input. Free, no signup." />
    <link rel="canonical" href="https://yetanotherquiz.com/flagQuiz/" />
    <link rel="preload" href="../flags/countries.json?v=__BUILD__" as="fetch" type="application/json" crossorigin />
    <title data-i18n="quiz.title">Yet Another Quiz: Country Flag Quiz</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="../flags/flagMap.css?v=__BUILD__" />
    <link rel="stylesheet" href="index.css?v=__BUILD__" />
  </head>
  <body>
    <div class="progress-bar" id="progress-bar"></div>
    <a class="lang-toggle" id="lang-toggle" href="#"></a>
    <script>
      // Sync lang-flag paint — sets data-current before any module imports
      // start, so the toggle shows the flag with first paint instead of
      // after the i18n.js graph resolves. Pinned by chrome.test.js.
      (function () {
        var lang = null;
        try {
          var s = localStorage.getItem('gridgame.lang');
          if (s === 'en' || s === 'pl') lang = s;
        } catch (e) {}
        if (!lang) {
          var n = (navigator.language || '').toLowerCase().split('-')[0];
          lang = n === 'pl' ? 'pl' : 'en';
        }
        document.getElementById('lang-toggle').setAttribute('data-current', lang);
      })();
    </script>
    <a class="flags-link" href="../flagsdata/" aria-label="Browse flags" title="Browse flags" data-i18n-attr="aria-label:menu.flagsData,title:menu.flagsData"><span class="flags-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      data-label-open="Open menu"
      data-label-close="Close menu"
      data-i18n-attr="aria-label:menu.open,data-label-open:menu.open,data-label-close:menu.close"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? this.dataset.labelOpen : this.dataset.labelClose);
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu" id="quiz-menu"></ul>
    </nav>
    <h1 class="sr-only">Country flag quiz</h1>
    <section id="quiz-picker" class="quiz-picker" hidden>
      <ul class="menu" id="quiz-picker-list"></ul>
      <div class="actions-row">
        <a href="../" data-i18n="menu.home">Home</a>
      </div>
    </section>
    <div id="game" hidden>
      <p class="play-timer">
        <span class="play-mode" id="play-mode"></span>
        <span class="mode-toggle" id="mode-toggle"></span>
        <span id="play-time">0:00.000</span>
      </p>
      <p class="country-name" id="country-name" data-i18n="quiz.loading">Loading…</p>
      <div class="choices" id="choices"></div>
      <section id="flag-map-section" hidden aria-hidden="true"></section>
      <div class="actions-row">
        <a id="play-again-inline" href="#" data-i18n="game.playAgain">Play again</a>
        ·
        <button type="button" id="give-up" data-i18n="game.giveUp">Give up</button>
        ·
        <a href="../" data-i18n="menu.home">Home</a>
      </div>
    </div>
    <section id="result" hidden>
      <p class="final-score" id="final-score-line">
        <span id="final-score-label" data-i18n="quiz.finalScore">Final score:</span> <span id="final-score">0</span>
      </p>
      <p class="time" id="time"></p>
      <p class="best" id="best"></p>
      <section id="daily-leaderboard" class="leaderboard" hidden>
        <h2 class="leaderboard-title" id="leaderboard-title" data-i18n="quiz.leaderboard.title">Today's leaderboard</h2>
        <div id="leaderboard-body"></div>
      </section>
      <p class="result-links">
        <a id="play-again" href="#" data-i18n="game.playAgain">Play again</a>
        ·
        <a href="../" data-i18n="menu.home">Home</a>
      </p>
    </section>
    <dialog id="zoom">
      <img alt="" />
      <p></p>
    </dialog>
    <script type="module">
      import { bootFlagQuiz } from './page.js';
      import { bootI18n, wireLangToggle } from '../i18n.js';
      import { wireBurgerDismiss } from '../common.js';
      // bootFlagQuiz uses t() while building the dynamic menu, so we have
      // to wait for i18n to load first. The menu also includes the lang
      // toggle, so wireLangToggle has to run after bootFlagQuiz resolves.
      // The nickname menu item is mounted inside `rebuildMenu` in page.js
      // (the menu wipes itself on every language switch — mounting it
      // here once would leak after the first rebuild).
      bootI18n('../').then((lang) => bootFlagQuiz().then(() => {
        // Soft-reload mode keeps the running game (current question,
        // timer, score) and the result screen intact across a language
        // switch. bootFlagQuiz registers a `langchanged` listener that
        // re-translates the burger menu, the in-game labels, and the
        // result strings.
        wireLangToggle(lang, undefined, { softReload: true, base: '../' });
        wireBurgerDismiss();
      }));
    </script>
  </body>
</html>
