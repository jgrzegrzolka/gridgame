<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flag Quiz</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 24px;
        background: #fafafa;
        color: #1c1c1c;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #menu {
        align-self: flex-start;
        margin: 24px 0 0 24px;
      }
      .variants {
        list-style: none;
        padding: 0;
        margin: 0;
        max-width: 400px;
        width: 100%;
      }
      .variants li {
        margin-bottom: 10px;
      }
      .variants a {
        color: #1c1c1c;
        text-decoration: none;
        font-size: 18px;
        font-weight: 500;
      }
      .variants a:hover {
        text-decoration: underline;
      }
      .play-timer {
        font-size: 14px;
        color: #666;
        margin: 0 0 12px;
        text-align: center;
        font-variant-numeric: tabular-nums;
      }
      .country-name {
        font-size: 28px;
        font-weight: 500;
        margin: 0 0 40px;
        text-align: center;
      }
      .choices {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        width: min(90vw, 480px);
      }
      .flag-choice {
        padding: 0;
        border: 2px solid #ddd;
        background: #fff;
        cursor: pointer;
        aspect-ratio: 4 / 3;
        overflow: hidden;
        transition: border-color 100ms;
      }
      .flag-choice:hover:not(:disabled) {
        border-color: #999;
      }
      .flag-choice:disabled {
        cursor: default;
      }
      .flag-choice.correct {
        border-color: #2a9d4a;
        animation: pulse-correct 1.1s ease-out infinite;
      }
      .flag-choice.wrong {
        border-color: #c5302d;
        animation: pulse-wrong 1.1s ease-out infinite;
      }
      @keyframes pulse-correct {
        0%   { box-shadow: 0 0 0 0 rgba(42, 157, 74, 0.7); }
        100% { box-shadow: 0 0 0 14px rgba(42, 157, 74, 0); }
      }
      @keyframes pulse-wrong {
        0%   { box-shadow: 0 0 0 0 rgba(197, 48, 45, 0.7); }
        100% { box-shadow: 0 0 0 14px rgba(197, 48, 45, 0); }
      }
      .flag-choice img {
        width: 100%;
        height: 100%;
        display: block;
      }
      .feedback {
        margin: 20px 0 12px;
        font-size: 18px;
        min-height: 24px;
        text-align: center;
      }
      .result {
        text-align: center;
        margin-top: 120px;
        animation: result-in 500ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
      }
      @keyframes result-in {
        0%   { opacity: 0; transform: translateY(16px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .final-score {
        font-size: 36px;
        font-weight: 500;
        margin: 0 0 8px;
        border-radius: 8px;
      }
      .final-score.celebrate {
        animation: celebrate-pulse 1.3s ease-out 4;
      }
      @keyframes celebrate-pulse {
        0%   { box-shadow: 0 0 0 0 rgba(42, 157, 74, 0.5); }
        100% { box-shadow: 0 0 0 28px rgba(42, 157, 74, 0); }
      }
      .time {
        font-size: 14px;
        color: #666;
        margin: 0 0 8px;
        font-variant-numeric: tabular-nums;
      }
      .best {
        font-size: 14px;
        color: #666;
        margin: 0 0 16px;
        font-variant-numeric: tabular-nums;
      }
      .best .new-badge {
        color: #2a9d4a;
        font-weight: 500;
        margin-left: 6px;
      }
      .result-links {
        font-size: 14px;
        color: #666;
        margin: 0;
      }
      .result-links a {
        color: #1c1c1c;
      }
    </style>
  </head>
  <body>
    <div id="menu" hidden>
      <ul class="variants" id="variants"></ul>
    </div>
    <div id="game" hidden>
      <p class="play-timer" id="play-timer">0:00.000</p>
      <p class="country-name" id="country-name">Loading…</p>
      <div class="choices" id="choices"></div>
      <p class="feedback" id="feedback"></p>
    </div>
    <div id="result" hidden>
      <p class="final-score" id="final-score-line">
        Final score: <span id="final-score">0</span>%
      </p>
      <p class="time" id="time"></p>
      <p class="best" id="best"></p>
      <p class="result-links">
        <a id="play-again" href="#">Play again</a>
      </p>
    </div>
    <script type="module">
      import {
        createQuiz,
        VARIANTS,
        availableModes,
        formatTime,
        nextBest,
        poolFor,
        targetFor,
      } from '../flags/quiz.js';

      const menuEl = document.getElementById('menu');
      const variantsEl = document.getElementById('variants');
      const gameEl = document.getElementById('game');
      const countryNameEl = document.getElementById('country-name');
      const choicesEl = document.getElementById('choices');
      const feedbackEl = document.getElementById('feedback');
      const resultEl = document.getElementById('result');
      const finalScoreLineEl = document.getElementById('final-score-line');
      const finalScoreEl = document.getElementById('final-score');
      const timeEl = document.getElementById('time');
      const bestEl = document.getElementById('best');
      const playTimerEl = document.getElementById('play-timer');
      const playAgainEl = document.getElementById('play-again');

      function loadBest(key) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }
      function saveBest(key, value) {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch {
          // localStorage may be disabled (private mode etc.) - silently skip.
        }
      }

      const params = new URLSearchParams(window.location.search);
      const variantKey = params.get('v');
      const modeKey = params.get('n');

      fetch('../flags/countries.json')
        .then((r) => r.json())
        .then((all) => {
          const variant = variantKey && VARIANTS[variantKey];
          if (!variant || !modeKey) {
            renderMenu(all);
            return;
          }
          const pool = all.filter(variant.filter);
          if (!availableModes(pool.length).includes(modeKey)) {
            // Unknown mode, or hand-edited URL asking for more questions
            // than the pool can offer.
            renderMenu(all);
            return;
          }
          startGame(variantKey, modeKey, all);
        })
        .catch((err) => {
          document.body.textContent = 'Failed to load: ' + err.message;
        });

      function renderMenu(all) {
        for (const [key, variant] of Object.entries(VARIANTS)) {
          const usable = availableModes(all.filter(variant.filter).length);
          const li = document.createElement('li');
          li.append(`${variant.label}: `);
          usable.forEach((m, i) => {
            const a = document.createElement('a');
            a.href = `?v=${key}&n=${m}`;
            a.textContent = m;
            li.appendChild(a);
            if (i < usable.length - 1) li.append(' | ');
          });
          variantsEl.appendChild(li);
        }
        menuEl.hidden = false;
      }

      function startGame(key, mode, all) {
        const pool = poolFor(key, all);
        const target = targetFor(mode, pool);
        const quiz = createQuiz(pool, target);

        let currentAnswer = null;
        let wrongCount = 0;
        const startTime = Date.now();
        let timerRaf = 0;

        function tickTimer() {
          playTimerEl.textContent = formatTime(Date.now() - startTime);
          timerRaf = requestAnimationFrame(tickTimer);
        }

        function score() {
          return Math.max(0, target - wrongCount);
        }

        function render(q) {
          currentAnswer = q.answer;
          countryNameEl.textContent = q.answer.name;
          choicesEl.innerHTML = '';
          for (const c of q.choices) {
            const tile = document.createElement('button');
            tile.className = 'flag-choice';
            tile.dataset.code = c.code;
            const img = document.createElement('img');
            img.src = `../flags/svg/${c.code}.svg`;
            img.alt = '';
            tile.appendChild(img);
            tile.addEventListener('click', () => onAnswer(c, tile));
            choicesEl.appendChild(tile);
          }
          feedbackEl.textContent = '';
        }

        function onAnswer(chosen, tile) {
          if (chosen.code === currentAnswer.code) {
            tile.classList.add('correct');
            for (const t of choicesEl.querySelectorAll('.flag-choice')) {
              t.disabled = true;
            }
            feedbackEl.textContent = '';
            const nextQ = quiz.next();
            if (!nextQ) {
              setTimeout(showResult, 500);
            } else {
              setTimeout(() => render(nextQ), 500);
            }
          } else {
            tile.classList.add('wrong');
            tile.disabled = true;
            feedbackEl.textContent = chosen.name;
            wrongCount++;
          }
        }

        function showResult() {
          cancelAnimationFrame(timerRaf);
          const ratio = score() / target;
          const pct = Math.round(ratio * 100);
          const elapsed = Date.now() - startTime;
          finalScoreEl.textContent = pct;
          // Red (0) -> yellow (60) -> green (120) along the score ratio.
          finalScoreLineEl.style.color = `hsl(${ratio * 120}, 65%, 38%)`;
          timeEl.textContent = `Time: ${formatTime(elapsed)}`;

          const bestKey = `flagquiz.best.${key}.${mode}`;
          const { best, isNew } = nextBest(
            loadBest(bestKey),
            { score: pct, time: elapsed },
          );
          if (isNew) saveBest(bestKey, best);
          bestEl.textContent = `Best: ${best.score}% in ${formatTime(best.time)}`;
          if (isNew) {
            const badge = document.createElement('span');
            badge.className = 'new-badge';
            badge.textContent = 'new!';
            bestEl.appendChild(badge);
            finalScoreLineEl.classList.add('celebrate');
          }

          gameEl.hidden = true;
          resultEl.hidden = false;
        }

        playAgainEl.href = window.location.pathname + window.location.search;

        gameEl.hidden = false;
        tickTimer();
        render(quiz.next());
      }
    </script>
  </body>
</html>
