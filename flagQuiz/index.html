<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flag Quiz</title>
    <link rel="stylesheet" href="../common.css" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="progress-bar" id="progress-bar"></div>
    <a class="back" id="back" href="../" aria-label="Back">←</a>
    <div id="menu" hidden>
      <table class="variants">
        <tbody id="variants"></tbody>
      </table>
    </div>
    <div id="game" hidden>
      <p class="play-timer" id="play-timer">0:00.000</p>
      <p class="country-name" id="country-name">Loading…</p>
      <div class="choices" id="choices"></div>
      <p class="feedback" id="feedback"></p>
    </div>
    <div id="result" hidden>
      <p class="final-score" id="final-score-line">
        Final score: <span id="final-score">0</span>%
      </p>
      <p class="time" id="time"></p>
      <p class="best" id="best"></p>
      <p class="result-links">
        <a id="play-again" href="#">Play again</a>
      </p>
    </div>
    <script type="module">
      import {
        createQuiz,
        VARIANTS,
        availableModes,
        formatTime,
        recordResult,
        loadBest,
        bestKey,
        scoreColor,
        poolFor,
        targetFor,
      } from '../flags/quiz.js';

      const menuEl = document.getElementById('menu');
      const variantsEl = document.getElementById('variants');
      const gameEl = document.getElementById('game');
      const countryNameEl = document.getElementById('country-name');
      const choicesEl = document.getElementById('choices');
      const feedbackEl = document.getElementById('feedback');
      const resultEl = document.getElementById('result');
      const finalScoreLineEl = document.getElementById('final-score-line');
      const finalScoreEl = document.getElementById('final-score');
      const timeEl = document.getElementById('time');
      const bestEl = document.getElementById('best');
      const playTimerEl = document.getElementById('play-timer');
      const playAgainEl = document.getElementById('play-again');
      const backEl = document.getElementById('back');
      const progressBarEl = document.getElementById('progress-bar');

      const params = new URLSearchParams(window.location.search);
      const variantKey = params.get('v');
      const modeKey = params.get('n');

      fetch('../flags/countries.json')
        .then((r) => r.json())
        .then((all) => {
          const variant = variantKey && VARIANTS[variantKey];
          if (!variant || !modeKey) {
            renderMenu(all);
            return;
          }
          const pool = all.filter(variant.filter);
          if (!availableModes(pool.length).includes(modeKey)) {
            // Unknown mode, or hand-edited URL asking for more questions
            // than the pool can offer.
            renderMenu(all);
            return;
          }
          startGame(variantKey, modeKey, all);
        })
        .catch((err) => {
          document.body.textContent = 'Failed to load: ' + err.message;
        });

      function modeRow(key, mode) {
        const link = document.createElement('td');
        link.className = 'link';
        const a = document.createElement('a');
        a.href = `?v=${key}&n=${mode}`;
        a.textContent = mode;
        link.appendChild(a);
        const pct = document.createElement('td');
        pct.className = 'pct';
        const time = document.createElement('td');
        time.className = 'time';
        const best = loadBest(localStorage, bestKey(key, mode));
        if (best) {
          pct.textContent = `${best.score}%`;
          pct.style.color = scoreColor(best.score / 100);
          time.textContent = formatTime(best.time);
        }
        return [link, pct, time];
      }

      function renderMenu(all) {
        for (const [key, variant] of Object.entries(VARIANTS)) {
          const usable = availableModes(all.filter(variant.filter).length);
          if (usable.length === 0) continue;
          usable.forEach((mode, i) => {
            const tr = document.createElement('tr');
            if (i === 0) {
              tr.className = 'variant-start';
              const label = document.createElement('td');
              label.className = 'label';
              label.rowSpan = usable.length;
              label.textContent = variant.label;
              tr.appendChild(label);
            }
            for (const cell of modeRow(key, mode)) tr.appendChild(cell);
            variantsEl.appendChild(tr);
          });
        }
        menuEl.hidden = false;
      }

      function startGame(key, mode, all) {
        backEl.href = window.location.pathname;
        const pool = poolFor(key, all);
        const target = targetFor(mode, pool);
        const quiz = createQuiz(pool, target);

        let currentAnswer = null;
        let wrongCount = 0;
        let answeredCount = 0;
        const startTime = Date.now();
        let timerRaf = 0;

        function tickTimer() {
          playTimerEl.textContent = formatTime(Date.now() - startTime);
          timerRaf = requestAnimationFrame(tickTimer);
        }

        function score() {
          return Math.max(0, target - wrongCount);
        }

        function render(q) {
          currentAnswer = q.answer;
          countryNameEl.textContent = q.answer.name;
          choicesEl.innerHTML = '';
          for (const c of q.choices) {
            const tile = document.createElement('button');
            tile.className = 'flag-choice';
            tile.dataset.code = c.code;
            const img = document.createElement('img');
            img.src = `../flags/svg/${c.code}.svg`;
            img.alt = '';
            tile.appendChild(img);
            tile.addEventListener('click', () => onAnswer(c, tile));
            choicesEl.appendChild(tile);
          }
          feedbackEl.textContent = '';
        }

        function onAnswer(chosen, tile) {
          if (chosen.code === currentAnswer.code) {
            answeredCount++;
            progressBarEl.style.width = (answeredCount / target * 100) + '%';
            tile.classList.add('correct');
            for (const t of choicesEl.querySelectorAll('.flag-choice')) {
              t.disabled = true;
            }
            feedbackEl.textContent = '';
            const nextQ = quiz.next();
            if (!nextQ) {
              setTimeout(showResult, 500);
            } else {
              setTimeout(() => render(nextQ), 500);
            }
          } else {
            tile.classList.add('wrong');
            tile.disabled = true;
            feedbackEl.textContent = chosen.name;
            wrongCount++;
          }
        }

        function showResult() {
          cancelAnimationFrame(timerRaf);
          const ratio = score() / target;
          const pct = Math.round(ratio * 100);
          const elapsed = Date.now() - startTime;
          finalScoreEl.textContent = pct;
          finalScoreLineEl.style.color = scoreColor(ratio);
          timeEl.textContent = `Time: ${formatTime(elapsed)}`;

          const { best, isNew } = recordResult(
            localStorage, key, mode, { score: pct, time: elapsed },
          );
          bestEl.textContent = `Your best score: ${best.score}% in ${formatTime(best.time)}`;
          if (isNew) {
            bestEl.appendChild(document.createTextNode(' '));
            const badge = document.createElement('span');
            badge.className = 'new-badge';
            badge.textContent = 'new record!';
            bestEl.appendChild(badge);
            finalScoreLineEl.classList.add('celebrate');
          }

          gameEl.hidden = true;
          resultEl.hidden = false;
        }

        playAgainEl.href = window.location.pathname + window.location.search;

        gameEl.hidden = false;
        tickTimer();
        render(quiz.next());
      }
    </script>
  </body>
</html>
