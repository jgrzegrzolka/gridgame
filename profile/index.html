<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Your profile and stats on Yet Another Quiz." />
    <link rel="canonical" href="https://yetanotherquiz.com/profile/" />
    <title data-i18n="profile.title">Your profile, Yet Another Quiz</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="lang-toggle" id="lang-toggle" href="#"></a>
    <script>
      // Sync lang-flag paint — sets data-current before any module imports
      // start, so the toggle shows the flag with first paint instead of
      // after the i18n.js graph resolves. Pinned by chrome.test.js.
      (function () {
        var lang = null;
        try {
          var s = localStorage.getItem('gridgame.lang');
          if (s === 'en' || s === 'pl') lang = s;
        } catch (e) {}
        if (!lang) {
          var n = (navigator.language || '').toLowerCase().split('-')[0];
          lang = n === 'pl' ? 'pl' : 'en';
        }
        document.getElementById('lang-toggle').setAttribute('data-current', lang);
      })();
    </script>
    <a class="flags-link" href="../flagsdata/" aria-label="Browse flags" title="Browse flags" data-i18n-attr="aria-label:menu.flagsData,title:menu.flagsData"><span class="flags-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      data-label-open="Open menu"
      data-label-close="Close menu"
      data-i18n-attr="aria-label:menu.open,data-label-open:menu.open,data-label-close:menu.close"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? this.dataset.labelOpen : this.dataset.labelClose);
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu" id="burger-menu">
        <li><a class="menu-coffee" href="https://suppi.pl/jgrzegrzolka" target="_blank" rel="noopener noreferrer" data-i18n="coffee">Buy me a coffee</a></li>
      </ul>
    </nav>

    <main class="profile-main">
      <form class="profile-form" id="profile-form">
        <div class="profile-avatar" id="profile-avatar" aria-hidden="true"></div>
        <div class="profile-input-row">
          <input
            type="text"
            class="profile-input"
            id="profile-input"
            maxlength="32"
            autocomplete="off"
            spellcheck="false"
            aria-label="Nickname"
            data-i18n-attr="aria-label:nickname.label"
          />
          <button type="submit" class="profile-save" data-i18n="nickname.save">Save</button>
        </div>
        <p class="profile-status" id="profile-status" role="status" aria-live="polite"></p>

        <section class="achievements" id="achievements" hidden aria-label="Achievements" data-i18n-attr="aria-label:profile.achievements.title">
          <p class="achievements-loading" id="achievements-loading" data-i18n="profile.achievements.loading">Loading achievements…</p>
          <ul class="achievements-grid" id="achievements-grid" hidden></ul>
        </section>

        <div class="actions-row">
          <span class="profile-sync-wrap" id="profile-sync-wrap">
            <a class="profile-sync-link" id="profile-sync-link" href="./sync/" data-i18n="menu.sync">Sync across devices</a>
          </span>
          ·
          <a href="../" data-i18n="menu.home">Home</a>
        </div>
      </form>
    </main>

    <dialog class="achievement-info" id="achievement-info" aria-labelledby="achievement-info-name">
      <div class="achievement-info-card">
        <span class="achievement-info-icon" id="achievement-info-icon" aria-hidden="true"></span>
        <h3 class="achievement-info-name" id="achievement-info-name"></h3>
        <p class="achievement-info-status" id="achievement-info-status"></p>
        <p class="achievement-info-body" id="achievement-info-body"></p>
      </div>
    </dialog>

    <script type="module">
      import { bootProfile } from './page.js';
      import { bootI18n, wireLangToggle } from '../i18n.js';
      import { disableBurgerIfEmpty, wireBurgerDismiss, mountNicknameMenuItem, mountSyncMenuItem, mountPrivacyMenuItem } from '../common.js';
      bootI18n('../').then((lang) => {
        wireLangToggle(lang, undefined, { softReload: true, base: '../' });
        bootProfile();
        mountNicknameMenuItem({
          rootEl: document.getElementById('burger-menu'),
          profileHref: './',
        });
        mountSyncMenuItem({
          rootEl: document.getElementById('burger-menu'),
          syncHref: './sync/',
        });
        mountPrivacyMenuItem({
          rootEl: document.getElementById('burger-menu'),
          privacyHref: '../privacy/',
        });
        disableBurgerIfEmpty(
          document.querySelector('.burger'),
          document.querySelector('#burger-panel .menu'),
        );
        wireBurgerDismiss();
      });
    </script>
  </body>
</html>
