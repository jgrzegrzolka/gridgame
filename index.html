<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gridgame</title>
    <link rel="stylesheet" href="common.css" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? 'Open menu' : 'Close menu');
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li><a href="allflags/">All flags</a></li>
      </ul>
    </nav>
    <ul class="menu">
      <li><a href="flagQuiz/">Flag Quiz</a></li>
      <li><a href="flagGrid/rand/">Flag Grid</a></li>
    </ul>
  </body>
</html>
