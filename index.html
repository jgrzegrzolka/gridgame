<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Country flag games for everyone — a 60-second country flag quiz, find all flags by continent or color, and tic-tac-toe with flags. Free, no signup." />
    <title>Yet Another Quiz — Country Flag Quiz, Find All Flags &amp; Tic-Tac-Toe</title>
    <link rel="canonical" href="https://yetanotherquiz.com/" />

    <!-- Open Graph / Twitter Card — controls the preview card when the
         home page is shared on social or chat. Generic enough to suit
         the whole site since /index.html is the canonical landing page. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yetanotherquiz.com/" />
    <meta property="og:title" content="Yet Another Quiz — Country Flag Quiz, Find All Flags &amp; Tic-Tac-Toe" />
    <meta property="og:description" content="Country flag games for everyone — quiz, find-all-flags by category, and tic-tac-toe with flags. Free, no signup." />
    <meta property="og:image" content="https://www.yetanotherquiz.com/og-banner.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Yet Another Quiz — wordmark above a row of six flags: Canada, Brazil, Poland, South Africa, Turkey, Japan." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Yet Another Quiz — Country Flag Quiz, Find All Flags &amp; Tic-Tac-Toe" />
    <meta name="twitter:description" content="Country flag games for everyone — quiz, find-all-flags by category, and tic-tac-toe with flags." />
    <meta name="twitter:image" content="https://www.yetanotherquiz.com/og-banner.png" />
    <meta name="twitter:image:alt" content="Yet Another Quiz — wordmark above a row of six flags: Canada, Brazil, Poland, South Africa, Turkey, Japan." />

    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="common.css?v=__BUILD__" />
    <link rel="stylesheet" href="index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="lang-toggle" id="lang-toggle" href="#"></a>
    <script>
      // Sync lang-flag paint — sets data-current before any module imports
      // start, so the toggle shows the flag with first paint instead of
      // after the i18n.js graph resolves. Pinned by chrome.test.js.
      (function () {
        var lang = null;
        try {
          var s = localStorage.getItem('gridgame.lang');
          if (s === 'en' || s === 'pl') lang = s;
        } catch (e) {}
        if (!lang) {
          var n = (navigator.language || '').toLowerCase().split('-')[0];
          lang = n === 'pl' ? 'pl' : 'en';
        }
        document.getElementById('lang-toggle').setAttribute('data-current', lang);
      })();
    </script>
    <a class="flags-link" href="flagsdata/" aria-label="Browse flags" title="Browse flags" data-i18n-attr="aria-label:menu.flagsData,title:menu.flagsData"><span class="flags-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      data-label-open="Open menu"
      data-label-close="Close menu"
      data-i18n-attr="aria-label:menu.open,data-label-open:menu.open,data-label-close:menu.close"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? this.dataset.labelOpen : this.dataset.labelClose);
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li><a class="menu-coffee" href="https://suppi.pl/jgrzegrzolka" target="_blank" rel="noopener noreferrer" data-i18n="coffee">Buy me a coffee</a></li>
      </ul>
    </nav>
    <main>
      <h1 class="sr-only">Yet Another Quiz — country flag games</h1>
      <section class="domain" aria-label="Flags" data-i18n-attr="aria-label:domain.flags">
        <div class="game-tiles">
          <a class="game-tile" href="daily/">
            <span class="tile-preview">
              <span class="daily-preview">
                <span class="daily-header-row">
                  <span class="daily-category" data-i18n="home.daily.category">Europe · cross</span>
                  <span class="daily-progress" data-i18n="home.daily.progress">5 / 10 found</span>
                </span>
                <span class="daily-found">
                  <img src="flags/svg/ch.svg" alt="" />
                  <img src="flags/svg/dk.svg" alt="" />
                  <img src="flags/svg/fi.svg" alt="" />
                  <img src="flags/svg/gb.svg" alt="" />
                  <img src="flags/svg/gr.svg" alt="" />
                </span>
              </span>
            </span>
            <span class="tile-label">
              <span class="game-icon icon-daily" aria-hidden="true"></span>
              <span class="game-name" data-i18n="tile.daily">Daily puzzle</span>
            </span>
          </a>
          <a class="game-tile" href="flagQuiz/?n=60s">
            <span class="tile-preview">
              <span class="quiz-preview">
                <span class="quiz-prompt" data-i18n="home.quiz.prompt">Poland</span>
                <span class="quiz-flags">
                  <img class="quiz-flag" src="flags/svg/ca.svg" alt="" />
                  <img class="quiz-flag" src="flags/svg/pl.svg" alt="" />
                  <img class="quiz-flag" src="flags/svg/kr.svg" alt="" />
                  <img class="quiz-flag" src="flags/svg/eg.svg" alt="" />
                </span>
              </span>
            </span>
            <span class="tile-label">
              <span class="game-icon icon-quiz" aria-hidden="true"></span>
              <span class="game-name" data-i18n="tile.quiz">60s Quiz</span>
            </span>
          </a>
          <a class="game-tile" href="findFlag/">
            <span class="tile-preview">
              <span class="find-preview">
                <span class="pill" data-i18n="home.find.asia">Asia</span>
                <span class="pill" data-i18n="home.find.hasWeapon">Has weapon</span>
                <span class="pill" data-i18n="home.find.redWhite">Red &amp; white</span>
                <span class="pill exclude" data-i18n="home.find.notCrescent">not crescent</span>
                <span class="pill" data-i18n="home.find.threeStripes">3 stripes</span>
              </span>
            </span>
            <span class="tile-label">
              <span class="game-icon icon-find" aria-hidden="true"></span>
              <span class="game-name" data-i18n="tile.find">Make a puzzle</span>
            </span>
          </a>
          <a class="game-tile" href="ticTacToe/">
            <span class="tile-preview">
              <span class="ttt-preview">
                <span class="ttt-grid">
                  <span class="ttt-cell p1 win"><img src="flags/svg/fr.svg" alt="" /></span>
                  <span class="ttt-cell p2"><img src="flags/svg/jp.svg" alt="" /></span>
                  <span class="ttt-cell"></span>
                  <span class="ttt-cell"></span>
                  <span class="ttt-cell p1 win"><img src="flags/svg/se.svg" alt="" /></span>
                  <span class="ttt-cell p2"><img src="flags/svg/cn.svg" alt="" /></span>
                  <span class="ttt-cell"></span>
                  <span class="ttt-cell"></span>
                  <span class="ttt-cell p1 win"><img src="flags/svg/it.svg" alt="" /></span>
                </span>
                <span class="ttt-result" data-i18n="home.ttt.result">Pink wins!</span>
              </span>
            </span>
            <span class="tile-label">
              <span class="game-icon icon-ttt" aria-hidden="true"></span>
              <span class="game-name" data-i18n="tile.ticTacToe">Tic Tac Toe</span>
            </span>
          </a>
        </div>
      </section>
    </main>
    <script type="module">
      import { bootI18n, wireLangToggle } from './i18n.js';
      import { disableBurgerIfEmpty, wireBurgerDismiss, mountNicknameMenuItem } from './common.js';
      bootI18n().then((lang) => {
        // Home page is `data-i18n`-only — applyStringsToDocument covers
        // every translated surface, so soft-reload is essentially free
        // here (no per-page langchanged listener needed).
        wireLangToggle(lang, undefined, { softReload: true, base: './' });
        disableBurgerIfEmpty(
          document.querySelector('.burger'),
          document.querySelector('#burger-panel .menu'),
        );
        wireBurgerDismiss();
        mountNicknameMenuItem({
          rootEl: document.querySelector('#burger-panel .menu'),
          profileHref: 'profile/',
        });
      });
    </script>
  </body>
</html>
