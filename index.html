<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>gridgame</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="common.css?v=__BUILD__" />
    <link rel="stylesheet" href="index.css?v=__BUILD__" />
  </head>
  <body>
    <span class="back" aria-label="Home" aria-disabled="true" role="link"><span class="home-icon" aria-hidden="true"></span></span>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? 'Open menu' : 'Close menu');
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li><a href="flagsdata/">Flags data</a></li>
      </ul>
    </nav>
    <section class="domain">
      <h2 class="domain-title">Flags</h2>
      <div class="game-tiles">
        <a class="game-tile" href="flagQuiz/?v=countries&amp;n=20">
          <span class="game-icon icon-quiz" aria-hidden="true"></span>
          <span class="game-name">Quiz</span>
        </a>
        <a class="game-tile" href="flagGrid/2/">
          <span class="game-icon icon-grid" aria-hidden="true"></span>
          <span class="game-name">Grid</span>
        </a>
        <a class="game-tile" href="findFlag/">
          <span class="game-icon icon-find" aria-hidden="true"></span>
          <span class="game-name">Find</span>
        </a>
        <a class="game-tile" href="ticTacToe/">
          <span class="game-icon icon-ttt" aria-hidden="true"></span>
          <span class="game-name">Tic Tac Toe</span>
        </a>
      </div>
    </section>
  </body>
</html>
