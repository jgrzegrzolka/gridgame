<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Country flag games for everyone: a 60-second country flag quiz, find all flags by continent or color, and tic-tac-toe with flags. Free, no signup." />
    <title>Yet Another Quiz: Country Flag Quiz, Find All Flags &amp; Tic-Tac-Toe</title>
    <link rel="canonical" href="https://yetanotherquiz.com/" />

    <!-- Open Graph / Twitter Card — controls the preview card when the
         home page is shared on social or chat. Generic enough to suit
         the whole site since /index.html is the canonical landing page. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yetanotherquiz.com/" />
    <meta property="og:title" content="Yet Another Quiz: Country Flag Quiz, Find All Flags &amp; Tic-Tac-Toe" />
    <meta property="og:description" content="Country flag games for everyone: quiz, find-all-flags by category, and tic-tac-toe with flags. Free, no signup." />
    <meta property="og:image" content="https://www.yetanotherquiz.com/og-banner.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Yet Another Quiz wordmark above a row of six flags: Canada, Brazil, Poland, South Africa, Turkey, Japan." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Yet Another Quiz: Country Flag Quiz, Find All Flags &amp; Tic-Tac-Toe" />
    <meta name="twitter:description" content="Country flag games for everyone: quiz, find-all-flags by category, and tic-tac-toe with flags." />
    <meta name="twitter:image" content="https://www.yetanotherquiz.com/og-banner.png" />
    <meta name="twitter:image:alt" content="Yet Another Quiz wordmark above a row of six flags: Canada, Brazil, Poland, South Africa, Turkey, Japan." />

    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="common.css?v=__BUILD__" />
    <link rel="stylesheet" href="flags/flagFacts.css?v=__BUILD__" />
    <link rel="stylesheet" href="index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="lang-toggle" id="lang-toggle" href="#"></a>
    <script>
      // Sync lang-flag paint — sets data-current before any module imports
      // start, so the toggle shows the flag with first paint instead of
      // after the i18n.js graph resolves. Pinned by chrome.test.js.
      (function () {
        var lang = null;
        try {
          var s = localStorage.getItem('gridgame.lang');
          if (s === 'en' || s === 'pl') lang = s;
        } catch (e) {}
        if (!lang) {
          var n = (navigator.language || '').toLowerCase().split('-')[0];
          lang = n === 'pl' ? 'pl' : 'en';
        }
        document.getElementById('lang-toggle').setAttribute('data-current', lang);
      })();
    </script>
    <a class="flags-link" href="flagsdata/" aria-label="Browse flags" title="Browse flags" data-i18n-attr="aria-label:menu.flagsData,title:menu.flagsData"><span class="flags-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      data-label-open="Open menu"
      data-label-close="Close menu"
      data-i18n-attr="aria-label:menu.open,data-label-open:menu.open,data-label-close:menu.close"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? this.dataset.labelOpen : this.dataset.labelClose);
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li><a href="findFlag/" data-i18n="tile.find">Make a puzzle</a></li>
        <li class="menu-divider"><a class="menu-coffee" href="https://suppi.pl/jgrzegrzolka" target="_blank" rel="noopener noreferrer" data-i18n="coffee">Buy me a coffee</a></li>
      </ul>
    </nav>
    <main>
      <h1 class="sr-only">Yet Another Quiz: country flag games</h1>
      <section class="domain" aria-label="Flags" data-i18n-attr="aria-label:domain.flags">
        <!-- Flag of the day — a compact, quiet card above the game grid.
             Populated by bootHome() (needs countries.json for the name +
             the story pool); stays hidden until it resolves, so no-JS /
             fetch-fail degrades to nothing rather than an empty box.
             Clicking opens the same story popup as /flagsdata/. -->
        <button type="button" class="fotd-card" id="flag-of-day" hidden>
          <span class="fotd-kicker" data-i18n="home.fotd.label">Flag of the day:</span>
          <img class="fotd-flag" alt="" />
          <span class="fotd-name"></span>
        </button>
        <div class="game-tiles">
          <a class="game-tile" href="daily/">
            <span class="tile-preview">
              <span class="daily-preview">
                <span class="daily-header-row">
                  <span class="daily-category" data-i18n="home.daily.category">Europe · cross</span>
                  <span class="daily-progress" data-i18n="home.daily.progress">5 / 10 found</span>
                </span>
                <span class="daily-found">
                  <img src="flags/svg/ch.svg" alt="" />
                  <img src="flags/svg/dk.svg" alt="" />
                  <img src="flags/svg/fi.svg" alt="" />
                  <img src="flags/svg/gb.svg" alt="" />
                  <img src="flags/svg/gr.svg" alt="" />
                </span>
              </span>
            </span>
            <span class="tile-label">
              <span class="game-icon icon-daily" aria-hidden="true"></span>
              <span class="game-name" data-i18n="tile.daily">Daily puzzle</span>
            </span>
          </a>
          <a class="game-tile" href="flagQuiz/?n=60s">
            <span class="tile-preview">
              <span class="quiz-preview">
                <span class="quiz-prompt" data-i18n="home.quiz.prompt">Poland</span>
                <span class="quiz-flags">
                  <img class="quiz-flag" src="flags/svg/ca.svg" alt="" />
                  <img class="quiz-flag" src="flags/svg/pl.svg" alt="" />
                  <img class="quiz-flag" src="flags/svg/kr.svg" alt="" />
                  <img class="quiz-flag" src="flags/svg/eg.svg" alt="" />
                </span>
              </span>
            </span>
            <span class="tile-label">
              <span class="game-icon icon-quiz" aria-hidden="true"></span>
              <span class="game-name" data-i18n="tile.quiz">60s Quiz</span>
            </span>
          </a>
          <a class="game-tile" href="flagParty/">
            <span class="tile-preview">
              <!-- Party preview: a live scoreboard — the standings everyone
                   races to climb. Mirrors the game's own break / final board
                   (rank · avatar · name · gain · score, leader highlighted),
                   which is what makes this tile read as the multiplayer one
                   rather than a twin of the 60s-Quiz tile beside it. Static,
                   like every other tile preview: the three identicons are the
                   real avatar art (flags/avatar.js palette), baked in as an
                   illustrative example the same way the quiz tile hardcodes
                   "Poland". Example player names (Ava / Ben) stay untranslated;
                   only "You", the room chip and the round chip are i18n'd. -->
              <span class="party-preview">
                <span class="party-head">
                  <span class="party-room" data-i18n="home.party.room">Room · 7KQ2</span>
                  <span class="party-round" data-i18n="home.party.round">Round 3</span>
                </span>
                <span class="pp-row pp-lead">
                  <span class="pp-rank">1</span>
                  <span class="avatar"><svg viewBox='0 0 5 5' fill='#0e7490' shape-rendering='crispEdges' aria-hidden='true'><rect x='0' y='0' width='1' height='1'/><rect x='4' y='0' width='1' height='1'/><rect x='0' y='1' width='1' height='1'/><rect x='4' y='1' width='1' height='1'/><rect x='2' y='1' width='1' height='1'/><rect x='1' y='3' width='1' height='1'/><rect x='3' y='3' width='1' height='1'/><rect x='2' y='3' width='1' height='1'/><rect x='1' y='4' width='1' height='1'/><rect x='3' y='4' width='1' height='1'/></svg></span>
                  <span class="pp-name">Ava</span>
                  <span class="pp-gain">+2</span>
                  <span class="pp-score">31</span>
                </span>
                <span class="pp-row">
                  <span class="pp-rank">2</span>
                  <span class="avatar"><svg viewBox='0 0 5 5' fill='#660033' shape-rendering='crispEdges' aria-hidden='true'><rect x='0' y='1' width='1' height='1'/><rect x='4' y='1' width='1' height='1'/><rect x='1' y='1' width='1' height='1'/><rect x='3' y='1' width='1' height='1'/><rect x='1' y='3' width='1' height='1'/><rect x='3' y='3' width='1' height='1'/><rect x='0' y='4' width='1' height='1'/><rect x='4' y='4' width='1' height='1'/><rect x='1' y='4' width='1' height='1'/><rect x='3' y='4' width='1' height='1'/><rect x='2' y='4' width='1' height='1'/></svg></span>
                  <span class="pp-name" data-i18n="home.party.you">You</span>
                  <span class="pp-gain">+1</span>
                  <span class="pp-score">28</span>
                </span>
                <span class="pp-row">
                  <span class="pp-rank">3</span>
                  <span class="avatar"><svg viewBox='0 0 5 5' fill='#1d4ed8' shape-rendering='crispEdges' aria-hidden='true'><rect x='1' y='0' width='1' height='1'/><rect x='3' y='0' width='1' height='1'/><rect x='0' y='1' width='1' height='1'/><rect x='4' y='1' width='1' height='1'/><rect x='0' y='2' width='1' height='1'/><rect x='4' y='2' width='1' height='1'/><rect x='0' y='3' width='1' height='1'/><rect x='4' y='3' width='1' height='1'/><rect x='1' y='3' width='1' height='1'/><rect x='3' y='3' width='1' height='1'/><rect x='2' y='3' width='1' height='1'/><rect x='1' y='4' width='1' height='1'/><rect x='3' y='4' width='1' height='1'/></svg></span>
                  <span class="pp-name">Ben</span>
                  <span class="pp-gain"></span>
                  <span class="pp-score">22</span>
                </span>
              </span>
            </span>
            <span class="tile-label">
              <span class="game-icon icon-party" aria-hidden="true"></span>
              <span class="game-name" data-i18n="tile.party">Flag Party</span>
            </span>
          </a>
          <a class="game-tile" href="ticTacToe/">
            <span class="tile-preview">
              <span class="ttt-preview">
                <span class="ttt-grid">
                  <span class="ttt-cell p1 win"><img src="flags/svg/fr.svg" alt="" /></span>
                  <span class="ttt-cell p2"><img src="flags/svg/jp.svg" alt="" /></span>
                  <span class="ttt-cell"></span>
                  <span class="ttt-cell"></span>
                  <span class="ttt-cell p1 win"><img src="flags/svg/se.svg" alt="" /></span>
                  <span class="ttt-cell p2"><img src="flags/svg/cn.svg" alt="" /></span>
                  <span class="ttt-cell"></span>
                  <span class="ttt-cell"></span>
                  <span class="ttt-cell p1 win"><img src="flags/svg/it.svg" alt="" /></span>
                </span>
                <span class="ttt-result" data-i18n="home.ttt.result">Pink wins!</span>
              </span>
            </span>
            <span class="tile-label">
              <span class="game-icon icon-ttt" aria-hidden="true"></span>
              <span class="game-name" data-i18n="tile.ticTacToe">Tic Tac Toe</span>
            </span>
          </a>
        </div>
      </section>
    </main>
    <dialog id="zoom" tabindex="-1">
      <button type="button" class="zoom-close" aria-label="Close" data-i18n-attr="aria-label:zoom.close">&times;</button>
      <div class="zoom-scroll quiet-scroll">
        <img alt="" />
        <p></p>
        <div class="country-facts" hidden></div>
        <!-- Image-credit footer, kept as a sibling of the facts panel (same as
             /flagsdata/) so both popups render the credit the same way.
             Populated by paintFacts; hidden when there's no story. -->
        <div class="country-credit" hidden></div>
      </div>
    </dialog>
    <script type="module">
      import { bootHome } from './page.js';
      bootHome();
    </script>
  </body>
</html>
