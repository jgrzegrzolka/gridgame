<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Country flag games for everyone: a 60-second country flag quiz, find all flags by continent or color, and tic-tac-toe with flags. Free, no signup." />
    <title>Yet Another Quiz: Country Flag Quiz, Find All Flags &amp; Tic-Tac-Toe</title>
    <link rel="canonical" href="https://yetanotherquiz.com/" />

    <!-- Open Graph / Twitter Card — controls the preview card when the
         home page is shared on social or chat. Generic enough to suit
         the whole site since /index.html is the canonical landing page. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yetanotherquiz.com/" />
    <meta property="og:title" content="Yet Another Quiz: Country Flag Quiz, Find All Flags &amp; Tic-Tac-Toe" />
    <meta property="og:description" content="Country flag games for everyone: quiz, find-all-flags by category, and tic-tac-toe with flags. Free, no signup." />
    <meta property="og:image" content="https://www.yetanotherquiz.com/og-banner.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Yet Another Quiz wordmark above a row of six flags: Canada, Brazil, Poland, South Africa, Turkey, Japan." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Yet Another Quiz: Country Flag Quiz, Find All Flags &amp; Tic-Tac-Toe" />
    <meta name="twitter:description" content="Country flag games for everyone: quiz, find-all-flags by category, and tic-tac-toe with flags." />
    <meta name="twitter:image" content="https://www.yetanotherquiz.com/og-banner.png" />
    <meta name="twitter:image:alt" content="Yet Another Quiz wordmark above a row of six flags: Canada, Brazil, Poland, South Africa, Turkey, Japan." />

    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="common.css?v=__BUILD__" />
    <link rel="stylesheet" href="index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="lang-toggle" id="lang-toggle" href="#"></a>
    <script>
      // Sync lang-flag paint — sets data-current before any module imports
      // start, so the toggle shows the flag with first paint instead of
      // after the i18n.js graph resolves. Pinned by chrome.test.js.
      (function () {
        var lang = null;
        try {
          var s = localStorage.getItem('gridgame.lang');
          if (s === 'en' || s === 'pl') lang = s;
        } catch (e) {}
        if (!lang) {
          var n = (navigator.language || '').toLowerCase().split('-')[0];
          lang = n === 'pl' ? 'pl' : 'en';
        }
        document.getElementById('lang-toggle').setAttribute('data-current', lang);
      })();
    </script>
    <a class="flags-link" href="flagsdata/" aria-label="Browse flags" title="Browse flags" data-i18n-attr="aria-label:menu.flagsData,title:menu.flagsData"><span class="flags-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      data-label-open="Open menu"
      data-label-close="Close menu"
      data-i18n-attr="aria-label:menu.open,data-label-open:menu.open,data-label-close:menu.close"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? this.dataset.labelOpen : this.dataset.labelClose);
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li><a href="findFlag/" data-i18n="tile.find">Make a puzzle</a></li>
        <li class="menu-divider"><a class="menu-coffee" href="https://suppi.pl/jgrzegrzolka" target="_blank" rel="noopener noreferrer" data-i18n="coffee">Buy me a coffee</a></li>
      </ul>
    </nav>
    <main>
      <h1 class="sr-only">Yet Another Quiz: country flag games</h1>
      <section class="home" aria-label="Flags" data-i18n-attr="aria-label:domain.flags">
        <!-- Hero: fully static, fabricated on purpose. A fixed headline + a
             decorative criteria line (Europe / cross / not blue — an EXAMPLE of
             the kind of rule, not today's actual one) + three fake flags. It
             touches no puzzle data, so the landing page makes no catalog fetch
             and stays instant; the "Today's puzzle" button links to the real
             daily. The criteria chips reuse the site's own marks — the red
             cross motif icon (filterChips.js MOTIF_ICONS) and a colour swatch —
             so the home speaks the same visual language as the games. The whole
             line is aria-hidden: it's illustrative, not a rule to announce. -->
        <section class="hero" id="hero">
          <h2 class="hero-title" data-i18n="home.hero.headline">Can you find them all?</h2>
          <p class="hero-crit" aria-hidden="true">
            <span class="crit-tok"><span data-i18n="home.hero.critPlace">Europe</span></span>
            <span class="crit-sep">·</span>
            <span class="crit-tok">
              <svg class="crit-gly" viewBox="0 0 24 24" fill="#cf2b2b" aria-hidden="true"><rect x="1.5" y="10" width="21" height="4" rx="0.5"/><rect x="7" y="2.5" width="4" height="19" rx="0.5"/></svg>
              <span data-i18n="home.hero.critShape">cross</span>
            </span>
            <span class="crit-sep">·</span>
            <span class="crit-tok crit-not">
              <span class="crit-swatch" style="background:#2f6fd0"></span>
              <span class="crit-not-pre" data-i18n="home.hero.critNot">not</span>
              <span data-i18n="home.hero.critColor">blue</span>
            </span>
          </p>
          <!-- Three fabricated flags plus one empty "to find" box — pure
               decoration, and deliberately STATIC MARKUP rather than painted by
               bootHome(). Being fake is the point: they fill the hero with flag
               imagery without spoiling today's answers, and the Jolly Roger
               winks that these aren't the ones to find.

               Inline, in the HTML, because this row is the first thing the eye
               lands on. Built in JS it waited on the module graph AND the 91KB
               translation fetch (mountHeroFlags used to sit inside
               bootI18n().then), so the headline and CTA painted instantly while
               the flags popped in visibly late. Nothing here needs i18n or the
               catalog; as markup it paints with everything else. Pinned by
               home.test.js — including that page.js must not touch it.

               Redrawn native 3:2 so they fill the same stamp boxes as the real
               found-flags. The artwork reuses the site's existing invented-flag
               set: the two-tone Nordic cross is FLAG_GLYPH from filterChips.js,
               the Jolly Roger is the "weird deck" symbol from deckIcons.js. The
               two fixed illustrative hues per flag are the documented exception
               to the eight-colour palette rule, the same standing as the real
               flag SVGs — a mark that depicts a flag can't be built from brand
               tokens. -->
          <div class="hero-stamps" aria-hidden="true">
            <span class="hero-stamp fake"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 24"><rect width="36" height="24" fill="#2a9d8f"/><rect x="10" y="0" width="4.5" height="24" fill="#f4efe6"/><rect x="0" y="9.75" width="36" height="4.5" fill="#f4efe6"/></svg></span>
            <span class="hero-stamp fake"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 24"><rect width="36" height="24" fill="#c65f9a"/><path d="M0 0L36 24M36 0L0 24" stroke="#f4efe6" stroke-width="5"/></svg></span>
            <span class="hero-stamp fake"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 24"><rect width="36" height="24" fill="#241f22"/><g stroke="#fff" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="13" x2="24" y2="19"/><line x1="24" y1="13" x2="12" y2="19"/></g><g fill="#fff"><circle cx="11.4" cy="12.6" r="1.5"/><circle cx="24.6" cy="12.6" r="1.5"/><circle cx="11.4" cy="19.4" r="1.5"/><circle cx="24.6" cy="19.4" r="1.5"/></g><ellipse cx="18" cy="10.5" rx="5" ry="5.3" fill="#fff"/><rect x="14.6" y="13.6" width="6.8" height="3.4" rx="1" fill="#fff"/><circle cx="16" cy="10" r="1.4" fill="#241f22"/><circle cx="20" cy="10" r="1.4" fill="#241f22"/><rect x="17.3" y="11.6" width="1.4" height="2" fill="#241f22"/></svg></span>
            <span class="hero-stamp todo"></span>
          </div>
          <a class="lobby-btn primary" id="hero-cta" href="daily/">
            <span class="game-icon icon-daily" aria-hidden="true"></span>
            <span class="hero-cta-label" data-i18n="home.hero.cta">Today's puzzle</span>
          </a>
        </section>

        <!-- The other games: one quiet, consistent list instead of four
             preview cards — each a slim row (icon · name · one-liner · arrow). -->
        <p class="start-sep" data-i18n="home.more">More ways to play</p>
        <nav class="game-list" aria-label="More ways to play" data-i18n-attr="aria-label:home.more">
          <a class="game-row" href="flagQuiz/?n=60s">
            <span class="game-icon icon-quiz" aria-hidden="true"></span>
            <span class="game-row-name" data-i18n="tile.quiz">60s Quiz</span>
            <span class="game-row-desc" data-i18n="home.desc.quiz">Beat the clock</span>
            <span class="game-row-arrow" aria-hidden="true"></span>
          </a>
          <a class="game-row" href="flagParty/">
            <span class="game-icon icon-party" aria-hidden="true"></span>
            <span class="game-row-name" data-i18n="tile.party">Party</span>
            <span class="game-row-desc" data-i18n="home.desc.party">Play together on your phones</span>
            <span class="game-row-arrow" aria-hidden="true"></span>
          </a>
          <a class="game-row" href="ticTacToe/">
            <span class="game-icon icon-ttt" aria-hidden="true"></span>
            <span class="game-row-name" data-i18n="tile.ticTacToe">Tic Tac Toe</span>
            <span class="game-row-desc" data-i18n="home.desc.ttt">Three flags in a row</span>
            <span class="game-row-arrow" aria-hidden="true"></span>
          </a>
        </nav>
      </section>
    </main>
    <script type="module">
      import { bootHome } from './page.js';
      bootHome();
    </script>
  </body>
</html>
