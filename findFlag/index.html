<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Find Flag</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="back" href="../" aria-label="Home"><span class="home-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? 'Open menu' : 'Close menu');
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li><a href="./">Pick a category</a></li>
        <li><a href="stats/">Your stats</a></li>
      </ul>
    </nav>

    <section id="chooser" hidden>
      <h1 class="find-title">Find Flag</h1>
      <p class="find-blurb">Pick a category and name every flag that matches.</p>
      <button type="button" class="find-random" id="find-random">🎲 Random category</button>
      <div id="chooser-sections"></div>
    </section>

    <section id="game" hidden>
      <header class="find-header">
        <span class="find-cat" id="find-cat"></span>
        <span class="find-count" id="find-count">0 / 0</span>
        <span class="find-time" id="find-time">0:00.000</span>
      </header>
      <div class="find-input-wrap">
        <input
          type="text"
          class="find-input"
          id="find-input"
          inputmode="text"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="Type a country name…"
        />
        <ul class="find-suggestions" id="find-suggestions" hidden></ul>
      </div>
      <p class="find-teach" id="find-teach" hidden></p>
      <ul class="find-found" id="find-found"></ul>
      <div class="find-below">
        <button type="button" class="give-up" id="give-up">Give up</button>
      </div>
    </section>

    <section id="result" hidden>
      <p class="final-score" id="final-score-line">
        You found <span id="final-found">0</span> / <span id="final-total">0</span>
      </p>
      <p class="time" id="final-time"></p>
      <p class="best" id="best"></p>
      <h2 class="missed-title" id="missed-title" hidden>Missed:</h2>
      <ul class="find-missed" id="find-missed"></ul>
      <p class="result-links">
        <a id="play-again" href="#">Play again</a>
        ·
        <a href="./">Pick another category</a>
      </p>
    </section>

    <script type="module">
      import { CONTINENTS } from '../flags/group.js?v=__BUILD__';
      import {
        COLORS_FOR_RANDOM,
        MOTIFS_FOR_RANDOM,
        suggest,
      } from '../flags/grid.js?v=__BUILD__';
      import {
        categoryFromId,
        findTargets,
        findPool,
        classifyGuess,
        recordFindResult,
      } from '../flags/findFlag.js?v=__BUILD__';
      import { formatTime, scoreColor } from '../flags/quiz.js?v=__BUILD__';

      // ---- bootstrap ----------------------------------------------------
      const chooserEl = document.getElementById('chooser');
      const gameEl = document.getElementById('game');
      const resultEl = document.getElementById('result');

      const params = new URLSearchParams(window.location.search);
      const catId = params.get('cat');

      fetch('../flags/countries.json?v=__BUILD__')
        .then((r) => r.json())
        .then((all) => {
          if (!catId) {
            renderChooser(all);
            chooserEl.hidden = false;
            return;
          }
          const cat = categoryFromId(catId);
          if (!cat) {
            chooserEl.hidden = false;
            renderChooser(all);
            return;
          }
          startGame(cat, all);
        })
        .catch((err) => {
          document.body.textContent = 'Failed to load: ' + err.message;
        });

      // ---- chooser ------------------------------------------------------
      function renderChooser(all) {
        const sectionsEl = document.getElementById('chooser-sections');
        const allCats = [
          ...CONTINENTS.map((n) => ({ id: `continent:${n}`, label: n })),
          ...COLORS_FOR_RANDOM.map((c) => ({ id: `hasColor:${c}`, label: `Has ${c}` })),
          ...MOTIFS_FOR_RANDOM.map((m) => ({ id: `hasMotif:${m}`, label: `Has ${m}` })),
        ];
        const sections = [
          { title: 'Continents', items: allCats.slice(0, CONTINENTS.length) },
          { title: 'Colors', items: allCats.slice(CONTINENTS.length, CONTINENTS.length + COLORS_FOR_RANDOM.length) },
          { title: 'Motifs', items: allCats.slice(CONTINENTS.length + COLORS_FOR_RANDOM.length) },
        ];
        for (const s of sections) {
          const sec = document.createElement('section');
          sec.className = 'chooser-section';
          const h = document.createElement('h2');
          h.textContent = s.title;
          sec.appendChild(h);
          const wrap = document.createElement('div');
          wrap.className = 'chooser-pills';
          for (const item of s.items) {
            const cat = categoryFromId(item.id);
            const count = findTargets(all, cat).length;
            if (count === 0) continue; // skip categories with no countries (e.g. an Antarctica round would be 0/0)
            const a = document.createElement('a');
            a.className = 'find-pill';
            a.href = `?cat=${encodeURIComponent(item.id)}`;
            a.innerHTML = `<span>${item.label}</span><span class="find-pill-count">${count}</span>`;
            wrap.appendChild(a);
          }
          sec.appendChild(wrap);
          sectionsEl.appendChild(sec);
        }
        document.getElementById('find-random').addEventListener('click', () => {
          const i = Math.floor(Math.random() * allCats.length);
          window.location.search = `?cat=${encodeURIComponent(allCats[i].id)}`;
        });
      }

      // ---- game ---------------------------------------------------------
      function startGame(category, all) {
        const targets = findTargets(all, category);
        const pool = findPool(all);
        const targetCodes = new Set(targets.map((c) => c.code));
        const foundCodes = new Set();
        const state = { targetCodes, foundCodes };

        const catEl = document.getElementById('find-cat');
        const countEl = document.getElementById('find-count');
        const timeEl = document.getElementById('find-time');
        const inputEl = document.getElementById('find-input');
        const sugEl = document.getElementById('find-suggestions');
        const teachEl = document.getElementById('find-teach');
        const foundEl = document.getElementById('find-found');
        const giveUpEl = document.getElementById('give-up');

        catEl.textContent = category.label;
        updateCount();

        let matches = [];
        let selected = 0;
        let teachTimer = 0;
        const startMs = Date.now();
        let timerRaf = 0;
        let finished = false;

        function updateCount() {
          countEl.textContent = `${foundCodes.size} / ${targetCodes.size}`;
        }
        function tick() {
          timeEl.textContent = formatTime(Date.now() - startMs);
          if (!finished) timerRaf = requestAnimationFrame(tick);
        }

        function renderSuggestions() {
          sugEl.innerHTML = '';
          matches.forEach((c, i) => {
            const li = document.createElement('li');
            if (i === selected) li.classList.add('selected');
            const img = document.createElement('img');
            img.src = `../flags/svg/${c.code}.svg`;
            img.alt = '';
            li.appendChild(img);
            const span = document.createElement('span');
            span.textContent = c.name;
            li.appendChild(span);
            li.addEventListener('mousedown', (e) => {
              e.preventDefault();
              submitCountry(c);
            });
            li.addEventListener('mouseenter', () => {
              selected = i;
              renderSelected();
            });
            sugEl.appendChild(li);
          });
          sugEl.hidden = matches.length === 0;
        }
        function renderSelected() {
          for (const [i, li] of sugEl.querySelectorAll('li').entries()) {
            li.classList.toggle('selected', i === selected);
          }
        }
        function updateSuggestions() {
          matches = suggest(pool, inputEl.value, { excludeCodes: foundCodes });
          selected = 0;
          renderSuggestions();
        }

        function shakeInput() {
          inputEl.classList.remove('shake');
          void inputEl.offsetWidth;
          inputEl.classList.add('shake');
        }
        function flashWrong() {
          inputEl.classList.remove('wrong');
          void inputEl.offsetWidth;
          inputEl.classList.add('wrong');
          setTimeout(() => inputEl.classList.remove('wrong'), 600);
        }

        function showTeach(c) {
          // Reveal-and-teach: flash the wrong country's flag + name so
          // the player learns what category it actually belongs to.
          clearTimeout(teachTimer);
          teachEl.innerHTML = '';
          const img = document.createElement('img');
          img.src = `../flags/svg/${c.code}.svg`;
          img.alt = '';
          teachEl.appendChild(img);
          const span = document.createElement('span');
          span.textContent = `${c.name} is not in this category`;
          teachEl.appendChild(span);
          teachEl.hidden = false;
          teachTimer = setTimeout(() => { teachEl.hidden = true; }, 1800);
        }

        function appendFound(c) {
          // Most-recent first: insert at the top so the player sees their
          // last successful guess without scrolling.
          const li = document.createElement('li');
          const img = document.createElement('img');
          img.src = `../flags/svg/${c.code}.svg`;
          img.alt = '';
          li.appendChild(img);
          const span = document.createElement('span');
          span.textContent = c.name;
          li.appendChild(span);
          foundEl.insertBefore(li, foundEl.firstChild);
        }

        function submitCountry(c) {
          const outcome = classifyGuess(state, c);
          if (outcome.kind === 'match') {
            foundCodes.add(c.code);
            appendFound(c);
            updateCount();
            inputEl.value = '';
            matches = [];
            renderSuggestions();
            if (foundCodes.size === targetCodes.size) finish(false);
            return;
          }
          if (outcome.kind === 'duplicate') {
            shakeInput();
            return;
          }
          if (outcome.kind === 'wrong-category') {
            flashWrong();
            showTeach(c);
            inputEl.value = '';
            matches = [];
            renderSuggestions();
            return;
          }
          // 'unknown' — couldn't resolve the typed text
          shakeInput();
        }

        inputEl.addEventListener('input', updateSuggestions);
        inputEl.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            const picked = matches[selected];
            if (picked) submitCountry(picked);
            else shakeInput();
            return;
          }
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (matches.length === 0) return;
            selected = (selected + 1) % matches.length;
            renderSelected();
            return;
          }
          if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (matches.length === 0) return;
            selected = (selected - 1 + matches.length) % matches.length;
            renderSelected();
            return;
          }
          if (e.key === 'Escape') {
            inputEl.value = '';
            matches = [];
            renderSuggestions();
          }
        });

        giveUpEl.addEventListener('click', () => finish(true));

        function finish(gaveUp) {
          if (finished) return;
          finished = true;
          cancelAnimationFrame(timerRaf);
          const elapsed = Date.now() - startMs;
          const found = foundCodes.size;
          const total = targetCodes.size;
          document.getElementById('final-found').textContent = String(found);
          document.getElementById('final-total').textContent = String(total);
          document.getElementById('final-time').textContent = `Time: ${formatTime(elapsed)}`;
          document.getElementById('final-score-line').style.color = scoreColor(found / total);

          const { best, isNew } = recordFindResult(
            localStorage,
            category.id,
            { time: elapsed, found, total },
          );
          const bestEl = document.getElementById('best');
          bestEl.textContent =
            `Your best: ${best.found} / ${best.total} in ${formatTime(best.time)}`;
          if (isNew) {
            bestEl.appendChild(document.createTextNode(' '));
            const badge = document.createElement('span');
            badge.className = 'new-badge';
            badge.textContent = 'new record!';
            bestEl.appendChild(badge);
          }

          const missed = targets.filter((c) => !foundCodes.has(c.code));
          const missedEl = document.getElementById('find-missed');
          missedEl.innerHTML = '';
          for (const c of missed) {
            const li = document.createElement('li');
            const img = document.createElement('img');
            img.src = `../flags/svg/${c.code}.svg`;
            img.alt = '';
            li.appendChild(img);
            const span = document.createElement('span');
            span.textContent = c.name;
            li.appendChild(span);
            missedEl.appendChild(li);
          }
          document.getElementById('missed-title').hidden = missed.length === 0;

          document.getElementById('play-again').href =
            window.location.pathname + window.location.search;

          gameEl.hidden = true;
          resultEl.hidden = false;
        }

        gameEl.hidden = false;
        tick();
        // Focus only on desktop — on mobile this would pop the keyboard
        // before the player has even seen the category.
        if (!('ontouchstart' in window)) inputEl.focus();
      }
    </script>
  </body>
</html>
