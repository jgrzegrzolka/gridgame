<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Find all country flags matching a category — continent, flag color, or motif (cross, star, animal…). Built-in autocomplete with diacritic tolerance." />
    <link rel="canonical" href="https://yetanotherquiz.com/findFlag/" />
    <link rel="preload" href="../flags/countries.json?v=__BUILD__" as="fetch" type="application/json" crossorigin />
    <title data-i18n="findFlag.title">Yet Another Quiz — Find All Country Flags by Category</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="back" href="../" aria-label="Home" data-i18n-attr="aria-label:back"><span class="home-icon" aria-hidden="true"></span></a>
    <a class="lang-toggle" id="lang-toggle" href="#"></a>
    <a class="coffee" href="https://suppi.pl/jgrzegrzolka" target="_blank" rel="noopener noreferrer" aria-label="Buy me a coffee" title="Buy me a coffee" data-i18n-attr="aria-label:coffee,title:coffee"><span class="coffee-icon" aria-hidden="true"></span></a>
    <a class="flags-link" href="../flagsdata/" aria-label="Browse flags" title="Browse flags" data-i18n-attr="aria-label:menu.flagsData,title:menu.flagsData"><span class="flags-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      data-label-open="Open menu"
      data-label-close="Close menu"
      data-i18n-attr="aria-label:menu.open,data-label-open:menu.open,data-label-close:menu.close"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? this.dataset.labelOpen : this.dataset.labelClose);
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li>
          <label class="scope-toggle">
            <span class="scope-toggle-text" data-i18n="menu.includeTerritories">Include territories &amp; other flags</span>
            <span class="scope-toggle-switch">
              <input type="checkbox" id="scope-toggle-input" />
              <span class="scope-toggle-track" aria-hidden="true"><span class="scope-toggle-thumb"></span></span>
            </span>
          </label>
        </li>
      </ul>
    </nav>

    <section id="chooser" hidden>
      <h1 class="find-title" data-i18n="findFlag.heading">Find Flag</h1>
      <p class="find-blurb" data-i18n="findFlag.blurb">Pick a category and name every flag that matches.</p>
      <div id="chooser-sections"></div>
      <button type="button" class="find-random" id="find-random" data-i18n="menu.random">Random</button>
      <div class="find-play-bar" id="find-play-bar" hidden>
        <button type="button" class="find-clear" id="find-clear" data-i18n="findFlag.clear" hidden>Clear</button>
        <span class="find-play-count" id="find-play-count"></span>
        <button type="button" class="find-play" id="find-play" data-i18n="findFlag.play" disabled>Play</button>
      </div>
    </section>

    <section id="game" hidden>
      <header class="find-header">
        <span class="find-cat" id="find-cat"></span>
        <span class="find-count" id="find-count">0 / 0</span>
      </header>
      <div class="find-input-wrap">
        <input
          type="text"
          class="find-input"
          id="find-input"
          inputmode="text"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="Type a country name…"
          data-i18n-attr="placeholder:findFlag.typeCountryName"
        />
        <ul class="find-suggestions" id="find-suggestions" hidden></ul>
      </div>
      <ul class="find-found" id="find-found"></ul>
      <div class="give-up-row">
        <a class="give-up" id="game-random" href="#" data-i18n="menu.random">Random</a>
        ·
        <button type="button" class="give-up" id="give-up" data-i18n="game.giveUp">Give up</button>
      </div>
    </section>

    <dialog id="zoom">
      <img alt="" />
      <p></p>
    </dialog>

    <section id="result" hidden>
      <p class="final-score" id="final-score-line">
        <span id="final-score-prefix" data-i18n="findFlag.youFound">You found</span><span id="final-score-fraction"> <span id="final-found">0</span> / <span id="final-total">0</span></span>
      </p>
      <h2 class="result-section-title" id="found-title" hidden data-i18n="findFlag.found">Found:</h2>
      <ul class="find-result-found" id="find-result-found"></ul>
      <h2 class="result-section-title" id="missed-title" hidden data-i18n="findFlag.missed">Missed:</h2>
      <ul class="find-missed" id="find-missed"></ul>
      <p class="result-links">
        <a id="play-again" href="#" data-i18n="game.playAgain">Play again</a>
        ·
        <a id="play-random" href="#" data-i18n="menu.random">Random</a>
        ·
        <a href="./" data-i18n="findFlag.pickAnotherCategory">Pick another category</a>
      </p>
    </section>

    <script type="module">
      import { bootFindFlag } from './page.js?v=__BUILD__';
      import { bootI18n, wireLangToggle } from '../i18n.js?v=__BUILD__';
      import { wireBurgerDismiss } from '../common.js?v=__BUILD__';
      bootI18n('../').then((lang) => {
        wireLangToggle(lang);
        bootFindFlag();
        wireBurgerDismiss();
      });
    </script>
  </body>
</html>
