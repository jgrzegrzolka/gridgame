<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Build a custom country-flag puzzle from continent, colour, and motif filters — then share the link or play it yourself." />
    <link rel="canonical" href="https://yetanotherquiz.com/findFlag/" />
    <link rel="preload" href="../flags/countries.json?v=__BUILD__" as="fetch" type="application/json" crossorigin />
    <title data-i18n="findFlag.title">Yet Another Quiz — Make a Custom Flag Puzzle</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="lang-toggle" id="lang-toggle" href="#"></a>
    <script>
      // Sync lang-flag paint — sets data-current before any module imports
      // start, so the toggle shows the flag with first paint instead of
      // after the i18n.js graph resolves. Pinned by chrome.test.js.
      (function () {
        var lang = null;
        try {
          var s = localStorage.getItem('gridgame.lang');
          if (s === 'en' || s === 'pl') lang = s;
        } catch (e) {}
        if (!lang) {
          var n = (navigator.language || '').toLowerCase().split('-')[0];
          lang = n === 'pl' ? 'pl' : 'en';
        }
        document.getElementById('lang-toggle').setAttribute('data-current', lang);
      })();
    </script>
    <a class="flags-link" href="../flagsdata/" aria-label="Browse flags" title="Browse flags" data-i18n-attr="aria-label:menu.flagsData,title:menu.flagsData"><span class="flags-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      data-label-open="Open menu"
      data-label-close="Close menu"
      data-i18n-attr="aria-label:menu.open,data-label-open:menu.open,data-label-close:menu.close"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? this.dataset.labelOpen : this.dataset.labelClose);
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li>
          <label class="scope-toggle">
            <span class="scope-toggle-text" data-i18n="menu.includeTerritories">Include territories &amp; other flags</span>
            <span class="scope-toggle-switch">
              <input type="checkbox" id="scope-toggle-input" />
              <span class="scope-toggle-track" aria-hidden="true"><span class="scope-toggle-thumb"></span></span>
            </span>
          </label>
        </li>
        <li class="menu-divider"><a class="menu-coffee" href="https://suppi.pl/jgrzegrzolka" target="_blank" rel="noopener noreferrer" data-i18n="coffee">Buy me a coffee</a></li>
      </ul>
    </nav>

    <section id="chooser" hidden>
      <h1 class="sr-only" data-i18n="findFlag.heading">Make a puzzle</h1>
      <p class="find-blurb" data-i18n="findFlag.blurb">Pick filters to build your puzzle, then play it or share the link.</p>
      <div class="find-clear-row">
        <button type="button" class="find-clear" id="find-clear" data-i18n="findFlag.clear" hidden>Clear all</button>
      </div>
      <div id="chooser-sections"></div>
      <div class="actions-row">
        <button type="button" class="row-cta" id="find-play" data-i18n="findFlag.play" disabled>Play</button>
        ·
        <button type="button" id="find-random" data-i18n="menu.random">Random</button>
        ·
        <a href="../" data-i18n="menu.home">Home</a>
      </div>
    </section>

    <section id="game" hidden>
      <header class="find-header">
        <span class="find-cat" id="find-cat"></span>
        <span class="find-count" id="find-count">0 / 0</span>
        <button type="button" class="share-link" id="game-share" aria-label="Share" data-i18n-attr="aria-label:findFlag.share"><span class="share-icon" aria-hidden="true"></span></button>
      </header>
      <div class="find-input-wrap">
        <input
          type="text"
          class="find-input"
          id="find-input"
          inputmode="text"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="Type a country name…"
          data-i18n-attr="placeholder:findFlag.typeCountryName"
        />
        <ul class="find-suggestions" id="find-suggestions" hidden></ul>
      </div>
      <ul class="find-found" id="find-found"></ul>
      <div class="actions-row">
        <button type="button" class="row-cta" id="give-up" data-i18n="game.giveUp">Give up</button>
        ·
        <a id="game-random" href="#" data-i18n="menu.random">Random</a>
        ·
        <a href="../" data-i18n="menu.home">Home</a>
      </div>
    </section>

    <dialog id="zoom">
      <img alt="" />
      <p></p>
    </dialog>

    <section id="result" hidden>
      <div class="final-score-row">
        <p class="final-score" id="final-score-line">
          <span id="final-score-prefix" data-i18n="findFlag.youFound">You found</span><span id="final-score-fraction"> <span id="final-found">0</span> / <span id="final-total">0</span></span>
        </p>
        <button type="button" class="share-link" id="result-share" aria-label="Share" data-i18n-attr="aria-label:findFlag.share"><span class="share-icon" aria-hidden="true"></span></button>
      </div>
      <h2 class="result-section-title" id="found-title" hidden data-i18n="findFlag.found">Found:</h2>
      <ul class="find-result-found" id="find-result-found"></ul>
      <h2 class="result-section-title" id="missed-title" hidden data-i18n="findFlag.missed">Missed:</h2>
      <ul class="find-missed" id="find-missed"></ul>
      <p class="result-links">
        <a id="play-again" href="#" data-i18n="game.playAgain">Play again</a>
        ·
        <a id="play-random" href="#" data-i18n="menu.random">Random</a>
        ·
        <a href="./" data-i18n="findFlag.pickAnotherCategory">Make another puzzle</a>
        ·
        <a href="../" data-i18n="menu.home">Home</a>
      </p>
    </section>

    <script type="module">
      import { bootFindFlag } from './page.js';
      import { bootI18n, wireLangToggle } from '../i18n.js';
      import { wireBurgerDismiss, mountNicknameMenuItem } from '../common.js';
      bootI18n('../').then((lang) => {
        // Soft-reload mode keeps the chooser's pill selections, a
        // running game's typed input + scroll + found tiles, and the
        // result screen all intact across a language switch.
        // bootFindFlag() registers a `langchanged` listener that
        // re-translates pill labels, the running game, and tile names.
        wireLangToggle(lang, undefined, { softReload: true, base: '../' });
        bootFindFlag();
        wireBurgerDismiss();
        mountNicknameMenuItem({
          rootEl: document.querySelector('#burger-panel .menu'),
          profileHref: '../profile/',
        });
      });
    </script>
  </body>
</html>
