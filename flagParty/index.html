<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Flag Party: a fast flag-picking party game you play together on your phones. Race to pick the right flag, points for being right and being first." />
    <link rel="canonical" href="https://yetanotherquiz.com/flagParty/" />
    <link rel="dns-prefetch" href="//gridgame-ttt.jgrzegrzolka.partykit.dev" />
    <link rel="preload" href="../flags/countries.json?v=__BUILD__" as="fetch" type="application/json" crossorigin />
    <title data-i18n="party.title">Yet Another Quiz: Flag Party</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="lang-toggle" id="lang-toggle" href="#"></a>
    <script>
      // Sync lang-flag paint — sets data-current before any module imports
      // start, so the toggle shows the flag with first paint instead of
      // after the i18n.js graph resolves. Pinned by chrome.test.js.
      (function () {
        var lang = null;
        try {
          var s = localStorage.getItem('gridgame.lang');
          if (s === 'en' || s === 'pl') lang = s;
        } catch (e) {}
        if (!lang) {
          var n = (navigator.language || '').toLowerCase().split('-')[0];
          lang = n === 'pl' ? 'pl' : 'en';
        }
        document.getElementById('lang-toggle').setAttribute('data-current', lang);
      })();
    </script>
    <a class="flags-link" href="../flagsdata/" aria-label="Browse flags" title="Browse flags" data-i18n-attr="aria-label:menu.flagsData,title:menu.flagsData"><span class="flags-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      data-label-open="Open menu"
      data-label-close="Close menu"
      data-i18n-attr="aria-label:menu.open,data-label-open:menu.open,data-label-close:menu.close"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? this.dataset.labelOpen : this.dataset.labelClose);
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li><a href="../" data-i18n="menu.home">Home</a></li>
        <li class="menu-divider"><a class="menu-coffee" href="https://suppi.pl/jgrzegrzolka" target="_blank" rel="noopener noreferrer" data-i18n="coffee">Buy me a coffee</a></li>
      </ul>
    </nav>

    <main class="party" id="party">
      <p class="party-status" id="party-status" hidden></p>

      <!-- Start: create or join -->
      <section class="pt-start" id="pt-start" hidden>
        <button type="button" class="lobby-btn primary" id="create-room" data-i18n="party.createRoom">New online game</button>
        <p class="start-sep" data-i18n="party.orJoin">or join a game</p>
        <form class="join-form" id="join-form">
          <input
            type="text"
            id="join-code"
            class="join-code"
            inputmode="text"
            autocomplete="off"
            autocapitalize="characters"
            spellcheck="false"
            maxlength="5"
            placeholder="ROOM CODE"
            data-i18n-attr="placeholder:party.codePlaceholder"
          />
          <button type="submit" class="lobby-btn" data-i18n="party.join">Join</button>
        </form>
        <p class="join-error" id="join-error" hidden></p>
        <div class="actions-row">
          <a href="../" data-i18n="menu.home">Home</a>
        </div>
      </section>

      <!-- Lobby -->
      <section class="pt-lobby" id="pt-lobby" hidden>
        <p class="room-line"><span class="room-text"><strong id="room-code">-----</strong></span><button type="button" class="share-link" id="share-btn" aria-label="Invite link" data-i18n-attr="aria-label:party.share"><span class="share-icon" aria-hidden="true"></span></button></p>
        <div class="players" id="players"></div>
        <!-- Host game setup, grouped in one bordered card so the two choices read
             as a single panel rather than two look-alike segmented strips with a
             line of text wedged between them. No card heading: the two field labels
             name the controls, and a lobby that already carries a room code, a
             player list and a start button does not need a fourth thing shouting.
             The whole card shows to guests too (disabled) and hides off the lobby
             via `#lobby-setup`; the two inner fields keep their own ids because the
             radiogroup paint / keyboard logic is scoped to them. -->
        <div class="lobby-setup" id="lobby-setup" hidden>
          <!-- First round on top. Round 1 used to always be Flags, decided by
               nobody; the host chooses it now, and it IS their first draft pick, so
               the rotation skips them a cycle. A `radiogroup`, not a row of
               `aria-pressed` toggles: exactly one applies, and the group wants
               arrow-key roving on one tab stop. The JS owns `tabindex` and
               `aria-checked`, and paints each segment its mode's own artwork. -->
          <div class="draft-length" id="draft-first-pick">
            <div class="dl-fieldhead">
              <span class="dl-group-label" data-i18n="party.firstPickLabel">First round</span>
              <!-- The veil is one on/off switch on the field's header row (every
                   opening mode is veilable, so one toggle, not a per-button chip).
                   The site's shared switch — `.scope-toggle` + a real hidden
                   checkbox — the same control the tic-tac-toe burger and TTT-online
                   board use, so an on/off toggle reads identically everywhere. Shown
                   to guests read-only (`.is-disabled`), like the radiogroups: the
                   opening is told, not withheld. The hover-tip spells out "starts
                   covered, clears on the clock". -->
              <label class="scope-toggle veil-toggle hover-tip" id="draft-first-pick-veil-label"
                     data-i18n-attr="data-tip:party.veilFirstPickHint"
                     data-tip="Veil the first round: the tiles start hidden and clear as the clock runs">
                <span class="scope-toggle-text" data-i18n="party.veilFirstPick">Covered start</span>
                <span class="scope-toggle-switch">
                  <input type="checkbox" id="draft-first-pick-veil" />
                  <span class="scope-toggle-track" aria-hidden="true"><span class="scope-toggle-thumb"></span></span>
                </span>
              </label>
            </div>
            <span class="dl-step" role="radiogroup" id="draft-first-pick-group"
                  data-i18n-attr="aria-label:party.firstPickLabel" aria-label="First round">
              <button type="button" class="dl-pick" role="radio" data-first-pick="flags-all" aria-checked="true" tabindex="0">
                <span class="dl-ic" aria-hidden="true"></span>
                <span class="dl-lab" data-i18n="party.modeShort.flagsAll">Flags</span>
              </button>
              <button type="button" class="dl-pick" role="radio" data-first-pick="flags-weird" aria-checked="false" tabindex="-1">
                <span class="dl-ic" aria-hidden="true"></span>
                <span class="dl-lab" data-i18n="party.modeShort.flagsWeird">Weird</span>
              </button>
              <button type="button" class="dl-pick" role="radio" data-first-pick="spot-flag" aria-checked="false" tabindex="-1">
                <span class="dl-ic" aria-hidden="true"></span>
                <span class="dl-lab" data-i18n="party.modeShort.spotFlag">Spot</span>
              </button>
              <button type="button" class="dl-pick" role="radio" data-first-pick="map-outlines" aria-checked="false" tabindex="-1">
                <span class="dl-ic" aria-hidden="true"></span>
                <span class="dl-lab" data-i18n="party.modeShort.mapOutlines">Maps</span>
              </button>
            </span>
          </div>
          <!-- Length below, so its rounds summary ("17 rounds · you each pick 2")
               rides the same header line as its label — label left, summary right,
               mirroring the first-round row's label + veil switch. It used to sit
               centred under the control, reading as a floating line between the two
               pickers. This field now carries a visible label too, so the two
               header rows match. -->
          <div class="draft-length" id="draft-length">
            <div class="dl-fieldhead">
              <span class="dl-group-label" data-i18n="party.gameLength">Game length</span>
              <span class="dl-hint" id="draft-length-hint"></span>
            </div>
            <span class="dl-step" role="radiogroup" id="draft-length-group"
                  data-i18n-attr="aria-label:party.gameLength" aria-label="Game length">
              <button type="button" class="dl-pick" role="radio" data-length="short" aria-checked="false" tabindex="-1">
                <span class="dl-ic" aria-hidden="true"></span>
                <span class="dl-lab" data-i18n="party.lengthShort">Short</span>
              </button>
              <button type="button" class="dl-pick" role="radio" data-length="medium" aria-checked="true" tabindex="0">
                <span class="dl-ic" aria-hidden="true"></span>
                <span class="dl-lab" data-i18n="party.lengthMedium">Medium</span>
              </button>
              <button type="button" class="dl-pick" role="radio" data-length="long" aria-checked="false" tabindex="-1">
                <span class="dl-ic" aria-hidden="true"></span>
                <span class="dl-lab" data-i18n="party.lengthLong">Long</span>
              </button>
            </span>
          </div>
        </div>
        <p class="lobby-wait" id="lobby-wait" data-i18n="party.waitingHost" hidden>Waiting for the host to start…</p>
        <div class="actions-row">
          <button type="button" class="row-cta" id="start-game" data-i18n="party.startGame" hidden>Start game</button>
          <span class="actions-sep" aria-hidden="true">·</span>
          <a href="../" data-i18n="menu.home">Home</a>
        </div>
      </section>

      <!-- Question (question + reveal share this) -->
      <section class="pt-question" id="pt-question" hidden>
        <!-- No pill here. It carried "Round 1/6 · Question 1/30" (a number that
             said the show is long, not where you are) and "Zosia's pick" — which
             the round card already shows, with an avatar, in the beat right
             before this question. `.question-pill` itself lives on: the pick and
             break screens below still wear it. -->
        <div class="question-timer" id="question-timer" data-mode="question" hidden>
          <div class="question-timer-track"><div class="question-timer-fill" id="question-timer-fill"></div></div>
          <div class="question-timer-label" id="question-timer-label"></div>
        </div>
        <div class="prompt" id="prompt">
          <span class="prompt-lead" id="prompt-lead"></span>
          <span class="prompt-target" id="prompt-target"></span>
        </div>
        <!-- What the chart's numbers are counted in ("medals · 2026"). A sibling
             of .prompt rather than a child, because .prompt turns into a flex ROW
             on superlative questions and this has to sit under the whole line.
             Only ever shown on a chart reveal — during the question there is no
             number on screen for it to explain. -->
        <p class="prompt-unit" id="prompt-unit" hidden></p>
        <div class="flags-grid" id="flags-grid"></div>
        <!-- "Hold to read" on a chart reveal. It lives HERE, as a sibling of the
             grid, rather than inside the chart the JS builds: the grid's
             innerHTML is replaced on every re-render, and a button destroyed
             mid-press would strand the hold with the finger still down. -->
        <div class="hold-read" id="hold-read" hidden>
          <button type="button" class="hold-btn" id="hold-btn">
            <span id="hold-btn-label" data-i18n="party.holdToRead">Hold to read</span>
          </button>
          <p class="hold-who" id="hold-who" aria-live="polite"></p>
        </div>
        <div class="question-foot" id="question-foot"></div>
        <div class="actions-row">
          <button type="button" id="question-to-settings" data-i18n="party.backToSettings" hidden>Back to settings</button>
          <span class="actions-sep" aria-hidden="true">·</span>
          <a href="../" data-i18n="menu.home">Home</a>
        </div>
      </section>

      <!-- Round title card: a short beat announcing the next round (2..N) before
           its first question begins -->
      <section class="pt-roundcard" id="pt-roundcard" hidden>
        <div class="roundcard">
          <span class="roundcard-count" id="roundcard-count"></span>
          <span class="roundcard-ring" aria-hidden="true">
            <svg class="roundcard-ring-svg" viewBox="0 0 80 80">
              <circle class="roundcard-ring-track" cx="40" cy="40" r="37" pathLength="100"></circle>
              <circle class="roundcard-ring-fill" id="roundcard-ring-fill" cx="40" cy="40" r="37" pathLength="100"></circle>
            </svg>
            <span class="roundcard-ic" id="roundcard-ic"></span>
          </span>
          <span class="roundcard-name" id="roundcard-name"></span>
          <span class="roundcard-pick" id="roundcard-pick" hidden></span>
        </div>
      </section>

      <!-- Draft pick: one player chooses the next round from a hand of cards -->
      <section class="pt-pick" id="pt-pick" hidden>
        <div class="question-pill" id="pick-pill"></div>
        <p class="plabel" id="pick-lead"></p>
        <div class="pick-hand" id="pick-hand"></div>
        <div class="pick-watch" id="pick-watch" hidden></div>
        <!-- The standings stay on screen while someone picks: a watcher used to
             get an avatar and nothing else for up to PICK_TIMEOUT_SECONDS. Same
             `.scoreline` rows as the break, dimmed except the picker's own. -->
        <div class="pick-board" id="pick-board" hidden></div>
      </section>

      <!-- Between-rounds break: the standings beat after each round (not the final one) -->
      <section class="pt-break" id="pt-break" hidden>
        <!-- No "After round 1 of 6" here. The round card counts the rounds in
             dots, and the break is self-evidently the beat after a round — the
             line restated position nobody had asked about. -->
        <div class="break-mvp" id="break-mvp" hidden></div>
        <p class="plabel" id="break-standings-label"></p>
        <div class="break-board" id="break-board"></div>
      </section>

      <!-- Final -->
      <section class="pt-final" id="pt-final" hidden>
        <p class="party-sub" id="final-sub"></p>
        <div class="final-board" id="final-board"></div>
        <p class="result-links">
          <button type="button" class="result-link" id="play-again" data-i18n="party.playAgain" hidden>Play again</button>
          <span class="result-sep" id="result-sep" aria-hidden="true" hidden>·</span>
          <a href="../" data-i18n="menu.home">Home</a>
        </p>
      </section>
    </main>

    <script type="module">
      import { bootFlagParty } from './page.js';
      import { disableBurgerIfEmpty, wireBurgerDismiss, mountNicknameMenuItem } from '../common.js';
      import { bootI18n, wireLangToggle } from '../i18n.js';
      bootI18n('../').then((lang) => {
        wireLangToggle(lang, undefined, { softReload: true, base: '../' });
        bootFlagParty();
        disableBurgerIfEmpty(
          document.querySelector('.burger'),
          document.querySelector('#burger-panel .menu'),
        );
        wireBurgerDismiss();
        mountNicknameMenuItem({
          rootEl: document.querySelector('#burger-panel .menu'),
          profileHref: '../profile/',
        });
      });
    </script>
  </body>
</html>
