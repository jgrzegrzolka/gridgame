name: Deploy PartyKit

# GitHub Pages auto-deploys the client on every push, but the PartyKit
# WebSocket server lives at gridgame-ttt.jgrzegrzolka.partykit.dev and only
# updates when partykit deploy runs. This workflow does that automatically
# whenever a push to main touches the server or anything it imports.
#
# Heads-up: a deploy restarts every Durable Object, so any in-progress room
# loses its game state. The path filter keeps this from happening on
# client-only changes (HTML/CSS, page.js, i18n strings).
#
# The flags/ entries below are the transitive import closure of the three
# PartyKit entry points (party/server.js,
# party/partyGameServer.js) — every shared module the deployed server actually
# bundles. Miss one and a push that changes it deploys the client but leaves the
# server on stale code (mis-scoring / crashes in online games); that gap bit the
# world-facts name reveal, where flags/party*.js changes weren't triggering a
# deploy. Globs cover the growth areas so new files auto-qualify: a new metric
# JSON, a new partyRounds/* module, or a new flags/party* helper needs no edit
# here. `flags/party*.js` also matches the client-only partyClient.js — a
# harmless over-trigger (a redundant deploy beats a silently stale server).
# Over-triggering is the safe failure direction.

on:
  push:
    branches: [main]
    paths:
      - 'party/**'
      - 'partykit.json'
      - '.github/workflows/deploy-partykit.yml'
      # Shared engine / domain modules the servers bundle:
      - 'flags/countries.json'
      - 'flags/engine.js'
      - 'flags/quiz.js'
      - 'flags/group.js'
      - 'flags/flagPools.js'
      - 'flags/contourPool.js'
      - 'flags/onlineRoom.js'
      - 'flags/ticTacToe.js'
      # Flag Party engine + data (globs cover new helpers, rounds, metrics):
      - 'flags/party*.js'
      - 'flags/partyRounds/**'
      - 'flags/metrics.js'
      - 'flags/metrics/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Same as deploy.yml: the daily catalog lives in blob, not the repo.
      # `npm test` reads `.catalog/*.json` to drive daily/difficulty.test.js
      # and flags/daily.test.js; without this pull those two suites fail
      # before any PartyKit-relevant test gets a chance to run.
      - run: node authoring/pull.mjs
      - run: npm test

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run typecheck

  deploy:
    needs: [test, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npx partykit deploy
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
          PARTYKIT_LOGIN: jgrzegrzolka
