name: Deploy to swa-yetanotherquiz-v2 (parallel verification)

# Temporary workflow for the parallel-SWA migration (2026-06-10). The
# original `swa-yetanotherquiz` instance is stuck in a "Uploading" state
# that Azure won't finalise (4 failed deploys, support ticket pending).
# This workflow pushes the same source to a fresh SWA instance so we can
# verify the artifact is fine + then flip Cloudflare DNS to the new one.
#
# Manual-trigger only (workflow_dispatch). Once the cutover is complete
# and the old SWA is deleted, this file goes away and the original
# deploy.yml gets its api_token secret swapped to the new instance.

on:
  workflow_dispatch:

# Distinct concurrency group so this doesn't fight with deploy.yml's
# `swa-deploy` group during the parallel-run period.
concurrency:
  group: swa-deploy-v2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Cache-bust by stamping __BUILD__ with the commit SHA
        run: |
          find . -name '*.html' -type f -exec sed -i "s/__BUILD__/${GITHUB_SHA}/g" {} +
      - name: Cache-bust JS imports and JSON fetches with the commit SHA
        run: node scripts/cache-bust.mjs ${GITHUB_SHA}
      - name: Strip preview-only files from the artifact
        run: |
          rm -rf daily/backlog daily/ideas
          rm -f daily/daily_backlog.json daily/daily_ideas.json daily/daily_parked.json
      - name: Minify JS / CSS for the artifact
        run: npm run build:minify
      - name: Drop dev-only artifacts before SWA upload
        run: |
          rm -rf node_modules party scripts .github .git
          find . -name '*.test.js' -delete
          rm -f tsconfig*.json package*.json partykit.json *.md
      - name: Deploy to Azure Static Web Apps (V2)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_V2 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "."
          api_location: "api"
          output_location: ""
          skip_app_build: true
