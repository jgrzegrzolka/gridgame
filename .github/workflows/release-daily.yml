name: Release next daily puzzle

# Promotes daily/daily_backlog.json[0] to daily/daily_puzzles.json
# once per Warsaw day, then commits and pushes to main. The existing
# deploy.yml workflow then ships the new live catalog as part of its
# normal push-to-main run.
#
# Reliability model:
#
# GitHub Actions cron is best-effort — firings can be 30+ min late,
# and the platform sometimes skips firings entirely under load. The
# original design (single 22:00/23:00 UTC firing + strict hour=00
# Warsaw guard) suffered from both modes: late firings missed the
# guard window, and skipped firings missed the day entirely.
#
# Current design:
#
# * **Tight burst of firings** — every 5 min for the first 30 min
#   after Warsaw midnight (7 attempts). Both DST states covered:
#   22:00 UTC = Warsaw midnight in summer (UTC+2), 23:00 UTC =
#   Warsaw midnight in winter (UTC+1). 7 + 7 = 14 firings/night
#   total, but only one corresponds to the current DST state and
#   most are absorbed by the dedup guard.
# * **"Already released today" guard** — instead of checking the
#   wallclock hour, we ask "has a `daily: release #` commit landed
#   today in Warsaw time?". If yes, skip; if no, proceed. Removes the
#   dependency on cron firing punctually — late firings still proceed
#   as long as today hasn't released yet.
#
# Net effect: the first firing of the Warsaw day wins; later firings
# observe "already released" and bail. If the first is skipped, the
# next catches up. Worst case (all firings skipped) the workflow can
# still be triggered manually via workflow_dispatch.

on:
  schedule:
    # Warsaw midnight in summer (UTC+2): every 5 min for first 30 min
    - cron: '0,5,10,15,20,25,30 22 * * *'
    # Warsaw midnight in winter (UTC+1): every 5 min for first 30 min
    - cron: '0,5,10,15,20,25,30 23 * * *'
  workflow_dispatch:

permissions:
  contents: write
  # Needed for the final step's `gh workflow run deploy.yml` call. The
  # bot's push to main uses GITHUB_TOKEN, which is deliberately NOT
  # allowed to trigger downstream `push`-event workflows (anti-loop
  # safeguard) — so we explicitly kick deploy via workflow_dispatch
  # instead. Without `actions: write`, the gh API call gets 403.
  actions: write

concurrency:
  group: release-daily
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # fetch-depth: 50 gives the guard enough history to find the
      # last release commit (we release ~1/day; 50 covers ~50 days even
      # if every commit is a release, far more than needed in practice).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Skip if already released today in Warsaw
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding regardless of prior release."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          warsaw_today=$(TZ=Europe/Warsaw date +%Y-%m-%d)
          last_release_iso=$(git log -1 --grep='^daily: release #' --format='%aI' 2>/dev/null || echo '')
          if [ -z "$last_release_iso" ]; then
            echo "No prior release commit found — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          last_release_warsaw=$(TZ=Europe/Warsaw date -d "$last_release_iso" +%Y-%m-%d)
          if [ "$last_release_warsaw" = "$warsaw_today" ]; then
            echo "Already released today ($warsaw_today Warsaw, last commit was $last_release_iso) — skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release yet today (Warsaw today=$warsaw_today, last=$last_release_warsaw) — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.proceed == 'true'
        with:
          node-version: '22'

      - run: npm ci
        if: steps.guard.outputs.proceed == 'true'

      - name: Promote backlog[0] to live
        if: steps.guard.outputs.proceed == 'true'
        id: promote
        run: node scripts/release-next.mjs

      - name: Validate catalog after move
        if: steps.guard.outputs.proceed == 'true'
        run: npm run validate

      - name: Commit & push
        if: steps.guard.outputs.proceed == 'true'
        env:
          N: ${{ steps.promote.outputs.n }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add daily/daily_puzzles.json daily/daily_backlog.json
          git commit -m "daily: release #${N} — auto-promoted from backlog"
          git push

      - name: Kick deploy
        # GITHUB_TOKEN pushes don't trigger downstream `push`-event
        # workflows, so deploy.yml won't fire on its own. Manually
        # dispatch it against main so the release lands on the live site.
        if: steps.guard.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
