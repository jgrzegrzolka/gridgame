name: Release next daily puzzle

# Promotes daily/daily_backlog.json[0] to daily/daily_puzzles.json
# once per Warsaw day, then commits and pushes to main. The existing
# deploy.yml workflow then ships the new live catalog as part of its
# normal push-to-main run.
#
# Trigger source:
#
# Fired daily at 00:05 Warsaw by an Azure Logic App
# (logic-yetanotherquiz-release-daily, defined in
# infra/logicapp-release-daily.bicep) via workflow_dispatch. The
# Recurrence trigger uses Windows TZ identifier "Central European
# Standard Time" so it auto-follows DST.
#
# Manual override: `gh workflow run release-daily.yml -f force=true`
# bypasses the "already released today" guard for double-releases.
#
# The "already released today" guard below stays defensive — re-deploys
# of the Logic App fire one extra workflow_dispatch at registration time
# (documented Logic Apps quirk), and the guard catches those cleanly.
#
# History: this workflow was originally triggered by GitHub's own
# `schedule:` cron, which proved unreliable (firings 75–135 min late
# under load). Moved to an Azure Logic App on 2026-06-10. See
# FEATURE.md "Feature E" for the full migration story.

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Release even if today already released (double-release override)'
        type: boolean
        default: false

permissions:
  contents: write
  # Needed for the final step's `gh workflow run deploy.yml` call. The
  # bot's push to main uses GITHUB_TOKEN, which is deliberately NOT
  # allowed to trigger downstream `push`-event workflows (anti-loop
  # safeguard) — so we explicitly kick deploy via workflow_dispatch
  # instead. Without `actions: write`, the gh API call gets 403.
  actions: write

concurrency:
  group: release-daily
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # fetch-depth: 50 gives the guard enough history to find the
      # last release commit (we release ~1/day; 50 covers ~50 days even
      # if every commit is a release, far more than needed in practice).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Skip if already released today in Warsaw
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            echo "Forced manual dispatch (inputs.force=true) — proceeding regardless of prior release."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          warsaw_today=$(TZ=Europe/Warsaw date +%Y-%m-%d)
          last_release_iso=$(git log -1 --grep='^daily: release #' --format='%aI' 2>/dev/null || echo '')
          if [ -z "$last_release_iso" ]; then
            echo "No prior release commit found — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          last_release_warsaw=$(TZ=Europe/Warsaw date -d "$last_release_iso" +%Y-%m-%d)
          if [ "$last_release_warsaw" = "$warsaw_today" ]; then
            echo "Already released today ($warsaw_today Warsaw, last commit was $last_release_iso) — skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release yet today (Warsaw today=$warsaw_today, last=$last_release_warsaw) — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.proceed == 'true'
        with:
          node-version: '22'

      - run: npm ci
        if: steps.guard.outputs.proceed == 'true'

      - name: Promote backlog[0] to live
        if: steps.guard.outputs.proceed == 'true'
        id: promote
        run: node scripts/release-next.mjs

      - name: Validate catalog after move
        if: steps.guard.outputs.proceed == 'true'
        run: npm run validate

      - name: Commit & push
        if: steps.guard.outputs.proceed == 'true'
        env:
          N: ${{ steps.promote.outputs.n }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add daily/daily_puzzles.json daily/daily_backlog.json
          git commit -m "daily: release #${N} — auto-promoted from backlog"
          git push

      - name: Kick deploy
        # GITHUB_TOKEN pushes don't trigger downstream `push`-event
        # workflows, so deploy.yml won't fire on its own. Manually
        # dispatch it against main so the release lands on the live site.
        if: steps.guard.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
