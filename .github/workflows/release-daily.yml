name: Release next daily puzzle

# Promotes daily/daily_backlog.json[0] to daily/daily_puzzles.json at
# Polish midnight, then commits and pushes to main. The existing
# deploy.yml workflow then ships the new live catalog as part of its
# normal push-to-main run.
#
# DST handling: GitHub Actions cron is UTC-only and Warsaw is UTC+1 in
# winter, UTC+2 in summer. We fire at BOTH 22:00 and 23:00 UTC and let
# the guard step bail on whichever doesn't currently match 00:00 in
# Europe/Warsaw. Simpler than maintaining DST math here, and works the
# moment Poland ever drops DST (the guard keeps tracking actual local
# midnight regardless of cron drift).
#
# Cron in Actions is "best effort" — typically 5–30 min late under load.
# Acceptable for a daily content release.

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-daily
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Bail if not midnight in Warsaw
        id: guard
        # workflow_dispatch (manual) always proceeds — useful for testing
        # and for forcing a release outside the cron window.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hour=$(TZ=Europe/Warsaw date +%H)
          if [ "$hour" = "00" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Warsaw hour is $hour, not 00 — skipping this cron firing."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.proceed == 'true'

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.proceed == 'true'
        with:
          node-version: '22'

      - run: npm ci
        if: steps.guard.outputs.proceed == 'true'

      - name: Promote backlog[0] to live
        if: steps.guard.outputs.proceed == 'true'
        id: promote
        run: node scripts/release-next.mjs

      - name: Validate catalog after move
        if: steps.guard.outputs.proceed == 'true'
        run: npm run validate

      - name: Commit & push
        if: steps.guard.outputs.proceed == 'true'
        env:
          N: ${{ steps.promote.outputs.n }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add daily/daily_puzzles.json daily/daily_backlog.json
          git commit -m "daily: release #${N} — auto-promoted from backlog"
          git push
