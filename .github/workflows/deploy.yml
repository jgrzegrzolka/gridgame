name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run typecheck

  deploy:
    needs: [test, typecheck]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Cache-bust by stamping __BUILD__ with the commit SHA
        # Each ?v=__BUILD__ in HTML imports becomes ?v=<sha> so browsers
        # treat every build as a unique URL and refetch assets after deploy.
        run: |
          find . -name '*.html' -type f -exec sed -i "s/__BUILD__/${GITHUB_SHA}/g" {} +
      - name: Minify JS / CSS for the artifact
        # Walks every source .js / .css file (excluding tests, node_modules,
        # the PartyKit server, and the build scripts themselves) and minifies
        # them in place with a sourcemap alongside. Local working copies stay
        # readable — minification only happens in the deploy artifact.
        run: npm run build:minify
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment
