name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Hand-cranked deploys and the trigger that release-daily.yml uses to
  # re-deploy after the bot pushes a release commit. Direct pushes to
  # main by GITHUB_TOKEN (which is what release-daily uses) deliberately
  # do NOT trigger downstream workflows — without this dispatch trigger,
  # the auto-release would land on main but never ship.
  workflow_dispatch:

concurrency:
  group: swa-deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Cap the job so a flaky node:test worker exit (occasionally seen on Node
    # 20 + ubuntu-latest) fails fast instead of burning the default 6 hours.
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm test

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run typecheck

  deploy:
    needs: [test, typecheck]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Cache-bust by stamping __BUILD__ with the commit SHA
        # Each ?v=__BUILD__ in HTML imports becomes ?v=<sha> so browsers
        # treat every build as a unique URL and refetch assets after deploy.
        run: |
          find . -name '*.html' -type f -exec sed -i "s/__BUILD__/${GITHUB_SHA}/g" {} +
      - name: Cache-bust JS imports and JSON fetches with the commit SHA
        # The HTML __BUILD__ pass only covers entry-point page.js, CSS,
        # and JSON preload hints. The shared modules that page.js then
        # imports (e.g. ../flags/quiz.js) and the JSON it fetches
        # (countries.json, daily_puzzles.json) carry no version in source.
        # Without this pass, a fresh page.js?v=<sha> would static-import
        # the OLD cached quiz.js after a shared-module edit, masking the
        # deploy. Walks every shipped .js file and appends ?v=<sha> to
        # string-literal and template-literal paths — see
        # scripts/cache-bust.mjs for the rewrite contract.
        run: node scripts/cache-bust.mjs ${GITHUB_SHA}
      - name: Strip preview-only files from the artifact
        # Author-only previews are repo-only — used locally at
        # /daily/backlog/ (staged unreleased puzzles) and /daily/ideas/
        # (brainstorm pool). Never shipped to prod. Removing the JSON
        # makes the data itself unreachable from the deployed site;
        # removing each preview folder takes the index, the play page,
        # and their JS with it so the author URLs aren't advertised
        # either. Compatible with the scheduled release flow: that job
        # promotes backlog[0] → live and commits, which triggers this
        # same workflow — both pools still get stripped on the way out.
        run: |
          rm -rf daily/backlog daily/ideas
          rm -f daily/daily_backlog.json daily/daily_ideas.json daily/daily_parked.json
      - name: Minify JS / CSS for the artifact
        # Walks every source .js / .css file (excluding tests, node_modules,
        # the PartyKit server, and the build scripts themselves) and minifies
        # them in place with a sourcemap alongside. Local working copies stay
        # readable — minification only happens in the deploy artifact.
        run: npm run build:minify
      - name: Drop dev-only artifacts before SWA upload
        # SWA Free SKU caps app content at 250 MB. Without this, node_modules
        # alone pushes us over. None of these are needed at runtime:
        # node_modules and scripts/ are build-time only; party/ is the PartyKit
        # server (deploys separately via deploy-partykit.yml); .github/ holds
        # workflow metadata. Tests and config files are stripped as a bonus —
        # the static site never references them.
        run: |
          rm -rf node_modules party scripts .github .git
          find . -name '*.test.js' -delete
          rm -f tsconfig*.json package*.json partykit.json *.md
      - name: Deploy to Azure Static Web Apps
        # Free SKU uses a deployment token (stored as repo secret) rather
        # than OIDC. skip_app_build keeps Azure Oryx out of the way since
        # we already minified above. api_location is empty for Feature A;
        # Feature B will set it to "api" when Functions land.
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "."
          api_location: ""
          output_location: ""
          skip_app_build: true
