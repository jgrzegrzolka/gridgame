name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: swa-deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Cap the job so a flaky node:test worker exit (occasionally seen on Node
    # 20 + ubuntu-latest) fails fast instead of burning the default 6 hours.
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Tests read the daily catalog from `.catalog/` (Phase 3 of Feature
      # P — blob is the source of truth, no committed copies in the repo).
      # authoring/pull.mjs is built-in-only (`node:fs/promises` + `fetch`),
      # so no `npm ci` needed.
      - run: node authoring/pull.mjs
      - run: npm test

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run typecheck

  changes:
    # Decide whether the deploy job should actually run.
    #
    # The deploy artifact strips author-only files before upload (see the
    # "Strip preview-only files" and "Drop dev-only artifacts" steps in
    # the `deploy` job). If a push to main only touched paths that get
    # stripped, the artifact is byte-identical to last build — the upload,
    # the CF purge, and the smoke-check are all no-ops, so we skip them.
    #
    # CRITICAL: the ignore-list regex below MUST stay in sync with the
    # strip steps in `deploy`. Adding a new author-only file? Add it both
    # to the strip step AND here. Adding a new SHIPPED asset? Do NOT add
    # it here, or genuine deploys will get skipped.
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      should_deploy: ${{ steps.filter.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need both sides of the push range to diff against
          # github.event.before. Repo is small, full history is cheap.
          fetch-depth: 0
      - id: filter
        run: |
          set -euo pipefail
          # workflow_dispatch is the manual "ship it" button — always deploy.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "workflow_dispatch: forcing deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # PRs and non-main pushes don't reach the deploy job anyway (its
          # own `if:` excludes them); report true so this gate never blocks
          # anything unexpected.
          if [ "${{ github.event_name }}" != "push" ] || [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "Not a push to main: gate is a no-op (deploy job will skip via its own if:)."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          echo "Changed paths:"
          echo "${changed}"
          # Strip-list — paths whose changes never reach the deployed
          # artifact. Keep in sync with the strip steps in `deploy`.
          shipped=$(echo "${changed}" | grep -vE '^(\.github/|infra/|scripts/|party/|daily/backlog/|daily/ideas/|.*\.md$|.*\.test\.js$|tsconfig.*\.json$|package.*\.json$|partykit\.json$)' || true)
          if [ -z "${shipped}" ]; then
            echo "No shipped paths changed — skipping deploy + CF purge."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "Shipped paths changed:"
            echo "${shipped}"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: [test, typecheck, changes]
    if: |
      needs.changes.outputs.should_deploy == 'true' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Cache-bust by stamping __BUILD__ with the commit SHA
        # Each ?v=__BUILD__ in HTML imports becomes ?v=<sha> so browsers
        # treat every build as a unique URL and refetch assets after deploy.
        run: |
          find . -name '*.html' -type f -exec sed -i "s/__BUILD__/${GITHUB_SHA}/g" {} +
      - name: Cache-bust JS imports and JSON fetches with the commit SHA
        # The HTML __BUILD__ pass only covers entry-point page.js, CSS,
        # and JSON preload hints. The shared modules that page.js then
        # imports (e.g. ../flags/quiz.js) and the JSON it fetches
        # (countries.json) carry no version in source. Without this
        # pass, a fresh page.js?v=<sha> would static-import the OLD
        # cached quiz.js after a shared-module edit, masking the deploy.
        # Walks every shipped .js file and appends ?v=<sha> to string-
        # literal and template-literal paths — see scripts/cache-bust.mjs
        # for the rewrite contract. (Catalog JSON now lives in blob with
        # its own Cache-Control: max-age=60 — out of scope for this pass.)
        run: node scripts/cache-bust.mjs ${GITHUB_SHA}
      - name: Strip preview-only folders from the artifact
        # Author-only previews live at /daily/backlog/ (staged unreleased
        # puzzles) and /daily/ideas/ (brainstorm pool). Both fetch their
        # data directly from the public-read catalog blob, so stripping
        # the folder removes the index + play page + their JS so the
        # author URLs aren't advertised on the deployed site.
        # (No `rm -f` for daily/daily_*.json — those files were deleted
        # in Phase 3 of Feature P; the catalog lives only in blob now.)
        run: |
          rm -rf daily/backlog daily/ideas
      - name: Minify JS / CSS for the artifact
        # Walks every source .js / .css file (excluding tests, node_modules,
        # the PartyKit server, and the build scripts themselves) and minifies
        # them in place with a sourcemap alongside. Local working copies stay
        # readable — minification only happens in the deploy artifact.
        run: npm run build:minify
      - name: Drop dev-only artifacts before SWA upload
        # SWA Free SKU caps app content at 250 MB. Without this, node_modules
        # alone pushes us over. None of these are needed at runtime:
        # node_modules and scripts/ are build-time only; party/ is the PartyKit
        # server (deploys separately via deploy-partykit.yml); .github/ holds
        # workflow metadata. Tests and config files are stripped as a bonus —
        # the static site never references them.
        run: |
          rm -rf node_modules party scripts .github .git
          find . -name '*.test.js' -delete
          rm -f tsconfig*.json package*.json partykit.json *.md
      - name: Deploy to Azure Static Web Apps (swa-yetanotherquiz-v3, West US 2)
        # Free SKU uses a deployment token (stored as repo secret) rather
        # than OIDC. skip_app_build keeps Azure Oryx out of the way for
        # the static site (we minified above). api_location points at the
        # bundled Functions folder — Oryx still runs there to install deps
        # and package the runtime.
        #
        # Targets `swa-yetanotherquiz-v3` (West US 2) since the original
        # West Europe SWA (`swa-yetanotherquiz`) was lost in the 2026-06-10
        # Azure WE content-distribution outage. See CLAUDE.md "Hosting".
        # When WE recovers, we'd add a sibling deploy-we.yml deploying to a
        # recreated WE instance for hot-standby — see FEATURE.md Feature D.
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_V3 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "."
          api_location: "api"
          output_location: ""
          skip_app_build: true

      - name: Purge Cloudflare cache (HTML pages only)
        # Targeted purge by URL instead of `purge_everything`. Once www is
        # Cloudflare-proxied (orange cloud), CF caches HTML up to the 2 h
        # Edge TTL set by the "Cache HTML for Always Online" rule — without
        # this purge, users would see up to 2 h of stale HTML after a deploy.
        #
        # Why not purge_everything anymore: a full purge wiped the SVG/JS/CSS
        # edge cache too, exposing every visitor to a cold-edge fetch against
        # the SWA Free SKU origin — which has erratic per-file latency spikes
        # (observed 10–20 s on individual flag SVGs after a deploy on
        # 2026-06-12). The asset cache doesn't need busting:
        #   - JS / CSS / JSON references are versioned with `?v=<sha>` by
        #     scripts/cache-bust.mjs, so the post-deploy HTML points at
        #     URLs CF has never seen — old cache entries are simply orphaned.
        #   - SVG filenames are stable; a flag image essentially never
        #     changes, and on the rare occasion one does, an explicit
        #     manual purge is acceptable.
        #
        # Zone ID is a public identifier, not a credential — hardcoded so the
        # workflow is self-documenting; only the API token is a secret.
        env:
          CLOUDFLARE_ZONE_ID: ea6c33138d6fe232e2505f35e233c98a
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          response=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"files":[
              "https://www.yetanotherquiz.com/",
              "https://www.yetanotherquiz.com/flagQuiz/",
              "https://www.yetanotherquiz.com/flagQuiz/stats/",
              "https://www.yetanotherquiz.com/findFlag/",
              "https://www.yetanotherquiz.com/daily/",
              "https://www.yetanotherquiz.com/daily/archive.html",
              "https://www.yetanotherquiz.com/flagsdata/",
              "https://www.yetanotherquiz.com/profile/",
              "https://www.yetanotherquiz.com/ticTacToe/",
              "https://www.yetanotherquiz.com/ticTacToe/offline/",
              "https://www.yetanotherquiz.com/ticTacToe/9x9/",
              "https://www.yetanotherquiz.com/ticTacToe/9x9/offline/"
            ]}')
          echo "${response}"
          if ! echo "${response}" | grep -q '"success":true'; then
            echo "FAIL: CF purge did not report success"
            exit 1
          fi
          echo "OK: CF HTML cache purged"

      - name: Smoke-check the custom domain after deploy
        # SWA reports "Succeeded" the moment its raw `*.azurestaticapps.net`
        # hostname has the new artifact, but the custom-domain edge can lag by
        # 15+ minutes — during the gap users hit www/ and get an Azure SWA 404
        # while raw-hostname serves 200 fine. Confirmed 2026-06-11 after #345:
        # deploy 07:21 UTC, www/ still 404 at 07:38, www/ 200 by 07:41.
        #
        # First sanity-check the raw hostname so we can tell artifact-broken
        # apart from edge-lag. Then poll the custom domain on a budget; if it
        # doesn't pick up the new content within the budget, fail loud so we
        # see the propagation window in the GH Actions history and can decide
        # whether to escalate (staticwebapp.config.json, CF-proxied www, etc).
        #
        # Cache-bust query string per attempt to keep the CDN edge from
        # answering from a stale per-URL cache entry.
        env:
          SWA_URL: https://wonderful-ground-01bf3091e.7.azurestaticapps.net/
          CUSTOM_URL: https://www.yetanotherquiz.com/
          BUDGET_SECONDS: 300
          POLL_INTERVAL: 5
        run: |
          set -euo pipefail
          swa_status=$(curl -sS -o /dev/null -w '%{http_code}' "${SWA_URL}?_=${GITHUB_SHA}")
          echo "raw SWA hostname /: ${swa_status}"
          if [ "$swa_status" != "200" ]; then
            echo "FAIL: artifact is broken — raw SWA hostname does not serve /"
            exit 1
          fi
          deadline=$((SECONDS + BUDGET_SECONDS))
          attempt=0
          while [ $SECONDS -lt $deadline ]; do
            attempt=$((attempt + 1))
            status=$(curl -sS -o /dev/null -w '%{http_code}' "${CUSTOM_URL}?_=${GITHUB_SHA}-${attempt}")
            echo "www attempt ${attempt}: ${status} (t=${SECONDS}s)"
            if [ "$status" = "200" ]; then
              echo "OK: www warmed up after ${SECONDS}s and ${attempt} attempts"
              exit 0
            fi
            sleep ${POLL_INTERVAL}
          done
          echo "FAIL: www/ still not 200 after ${BUDGET_SECONDS}s — propagation gap exceeded budget"
          exit 1

      - name: Warm Cloudflare HTML cache
        # Each deploy purges CF's HTML cache for the 12 entry-point URLs
        # (see "Purge Cloudflare cache" above). Until those URLs are
        # re-fetched, the next visitor pays a cold-edge fetch against the
        # SWA Free SKU origin in West US 2 — observed ~2 s on a 3 KB HTML
        # doc from Poland on 2026-06-12. This step pre-fetches each URL
        # so CF caches it before real traffic arrives.
        #
        # No `?_=…` cache-buster here — we want the bare URLs that real
        # visitors hit. The earlier smoke-check uses `?_=<sha>` precisely
        # to avoid caching (it's verifying SWA serves fresh), so it does
        # not double as warming.
        #
        # CF caches per-POP, so warming from GitHub's runner POP only
        # primes that one. Users in other regions still cold-fetch on
        # first hit. If that becomes noticeable, enable CF Tiered Cache
        # (free) so lower-tier POPs can pull from the warmed upper-tier
        # instead of going all the way to SWA.
        #
        # URL list MUST stay in sync with the purge step above. Warming
        # failures are non-fatal (the next real visitor warms it anyway)
        # so we don't `set -e` on the loop and swallow curl errors with
        # `|| true`.
        run: |
          set -uo pipefail
          for url in \
            https://www.yetanotherquiz.com/ \
            https://www.yetanotherquiz.com/flagQuiz/ \
            https://www.yetanotherquiz.com/flagQuiz/stats/ \
            https://www.yetanotherquiz.com/findFlag/ \
            https://www.yetanotherquiz.com/daily/ \
            https://www.yetanotherquiz.com/daily/archive.html \
            https://www.yetanotherquiz.com/flagsdata/ \
            https://www.yetanotherquiz.com/profile/ \
            https://www.yetanotherquiz.com/ticTacToe/ \
            https://www.yetanotherquiz.com/ticTacToe/offline/ \
            https://www.yetanotherquiz.com/ticTacToe/9x9/ \
            https://www.yetanotherquiz.com/ticTacToe/9x9/offline/
          do
            curl -sS -o /dev/null -w "  ${url}: %{http_code} (%{time_total}s)\n" "${url}" || true
          done
