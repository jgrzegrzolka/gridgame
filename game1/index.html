<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game 1 — Flag Quiz</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 24px;
        background: #fafafa;
        color: #1c1c1c;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .country-name {
        font-size: 28px;
        font-weight: 500;
        margin: 16px 0 24px;
        text-align: center;
      }
      .choices {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        width: min(90vw, 480px);
      }
      .flag-choice {
        padding: 0;
        border: 2px solid #ddd;
        background: #fff;
        cursor: pointer;
        aspect-ratio: 4 / 3;
        overflow: hidden;
        transition: border-color 100ms;
      }
      .flag-choice:hover:not(:disabled) {
        border-color: #999;
      }
      .flag-choice:disabled {
        cursor: default;
      }
      .flag-choice.correct {
        border-color: #2a9d4a;
        box-shadow: 0 0 0 2px #2a9d4a;
      }
      .flag-choice.wrong {
        border-color: #c5302d;
        box-shadow: 0 0 0 2px #c5302d;
      }
      .flag-choice img {
        width: 100%;
        height: 100%;
        display: block;
      }
      .feedback {
        margin: 20px 0 12px;
        font-size: 18px;
        min-height: 24px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <p class="country-name" id="country-name">Loading…</p>
    <div class="choices" id="choices"></div>
    <p class="feedback" id="feedback"></p>
    <script type="module">
      import { pickQuestion } from '../flags/quiz.js';

      const countryNameEl = document.getElementById('country-name');
      const choicesEl = document.getElementById('choices');
      const feedbackEl = document.getElementById('feedback');

      let countries = [];
      let currentAnswer = null;

      function render(q) {
        currentAnswer = q.answer;
        countryNameEl.textContent = q.answer.name;
        choicesEl.innerHTML = '';
        for (const c of q.choices) {
          const tile = document.createElement('button');
          tile.className = 'flag-choice';
          tile.dataset.code = c.code;
          const img = document.createElement('img');
          img.src = `../flags/svg/${c.code}.svg`;
          img.alt = '';
          tile.appendChild(img);
          tile.addEventListener('click', () => onAnswer(c, tile));
          choicesEl.appendChild(tile);
        }
        feedbackEl.textContent = '';
      }

      function onAnswer(chosen, tile) {
        if (chosen.code === currentAnswer.code) {
          tile.classList.add('correct');
          for (const t of choicesEl.querySelectorAll('.flag-choice')) {
            t.disabled = true;
          }
          feedbackEl.textContent = '';
          setTimeout(() => render(pickQuestion(countries)), 500);
        } else {
          tile.classList.add('wrong');
          tile.disabled = true;
          feedbackEl.textContent = chosen.name;
        }
      }

      fetch('../flags/countries.json')
        .then((r) => r.json())
        .then((all) => {
          countries = all;
          render(pickQuestion(countries));
        })
        .catch((err) => {
          countryNameEl.textContent = 'Failed to load: ' + err.message;
        });
    </script>
  </body>
</html>
