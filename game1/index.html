<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game 1 — Flag Quiz</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 24px;
        background: #fafafa;
        color: #1c1c1c;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .variants {
        list-style: none;
        padding: 0;
        margin: 0;
        max-width: 400px;
        width: 100%;
      }
      .variants li {
        margin-bottom: 10px;
      }
      .variants a {
        color: #1c1c1c;
        text-decoration: none;
        font-size: 18px;
        font-weight: 500;
      }
      .variants a:hover {
        text-decoration: underline;
      }
      .status {
        font-size: 14px;
        color: #666;
        margin: 0 0 12px;
        text-align: center;
        font-variant-numeric: tabular-nums;
      }
      .country-name {
        font-size: 28px;
        font-weight: 500;
        margin: 0 0 24px;
        text-align: center;
      }
      .choices {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        width: min(90vw, 480px);
      }
      .flag-choice {
        padding: 0;
        border: 2px solid #ddd;
        background: #fff;
        cursor: pointer;
        aspect-ratio: 4 / 3;
        overflow: hidden;
        transition: border-color 100ms;
      }
      .flag-choice:hover:not(:disabled) {
        border-color: #999;
      }
      .flag-choice:disabled {
        cursor: default;
      }
      .flag-choice.correct {
        border-color: #2a9d4a;
        box-shadow: 0 0 0 2px #2a9d4a;
      }
      .flag-choice.wrong {
        border-color: #c5302d;
        box-shadow: 0 0 0 2px #c5302d;
      }
      .flag-choice img {
        width: 100%;
        height: 100%;
        display: block;
      }
      .feedback {
        margin: 20px 0 12px;
        font-size: 18px;
        min-height: 24px;
        text-align: center;
      }
      .result {
        text-align: center;
        margin-top: 80px;
      }
      .final-score {
        font-size: 36px;
        font-weight: 500;
        margin: 0 0 16px;
      }
      .result-links {
        font-size: 14px;
        color: #666;
        margin: 0;
      }
      .result-links a {
        color: #1c1c1c;
      }
    </style>
  </head>
  <body>
    <div id="menu" hidden>
      <ul class="variants" id="variants"></ul>
    </div>
    <div id="game" hidden>
      <p class="status" id="status"></p>
      <p class="country-name" id="country-name">Loading…</p>
      <div class="choices" id="choices"></div>
      <p class="feedback" id="feedback"></p>
    </div>
    <div id="result" hidden>
      <p class="final-score">
        Final score: <span id="final-score">0</span> /
        <span id="final-target">0</span>
      </p>
      <p class="result-links">
        <a id="play-again" href="#">Play again</a> ·
        <a href="./">Back to menu</a>
      </p>
    </div>
    <script type="module">
      import {
        createQuiz,
        VARIANTS,
        poolFor,
        targetFor,
      } from '../flags/quiz.js';

      const menuEl = document.getElementById('menu');
      const variantsEl = document.getElementById('variants');
      const gameEl = document.getElementById('game');
      const statusEl = document.getElementById('status');
      const countryNameEl = document.getElementById('country-name');
      const choicesEl = document.getElementById('choices');
      const feedbackEl = document.getElementById('feedback');
      const resultEl = document.getElementById('result');
      const finalScoreEl = document.getElementById('final-score');
      const finalTargetEl = document.getElementById('final-target');
      const playAgainEl = document.getElementById('play-again');

      const variantKey = new URLSearchParams(window.location.search).get('v');

      fetch('../flags/countries.json')
        .then((r) => r.json())
        .then((all) => {
          if (!variantKey || !VARIANTS[variantKey]) {
            renderMenu();
          } else {
            startGame(variantKey, all);
          }
        })
        .catch((err) => {
          document.body.textContent = 'Failed to load: ' + err.message;
        });

      function renderMenu() {
        for (const [key, { label }] of Object.entries(VARIANTS)) {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = `?v=${key}`;
          a.textContent = label;
          li.appendChild(a);
          variantsEl.appendChild(li);
        }
        menuEl.hidden = false;
      }

      function startGame(key, all) {
        const pool = poolFor(key, all);
        const target = targetFor(key, pool);
        const quiz = createQuiz(pool, target);

        let currentAnswer = null;
        let correctCount = 0;
        let wrongCount = 0;

        function score() {
          return Math.max(0, target - wrongCount);
        }

        function updateStatus() {
          statusEl.textContent = `${correctCount} / ${target}  ·  score ${score()}`;
        }

        function render(q) {
          currentAnswer = q.answer;
          countryNameEl.textContent = q.answer.name;
          choicesEl.innerHTML = '';
          for (const c of q.choices) {
            const tile = document.createElement('button');
            tile.className = 'flag-choice';
            tile.dataset.code = c.code;
            const img = document.createElement('img');
            img.src = `../flags/svg/${c.code}.svg`;
            img.alt = '';
            tile.appendChild(img);
            tile.addEventListener('click', () => onAnswer(c, tile));
            choicesEl.appendChild(tile);
          }
          feedbackEl.textContent = '';
        }

        function onAnswer(chosen, tile) {
          if (chosen.code === currentAnswer.code) {
            tile.classList.add('correct');
            for (const t of choicesEl.querySelectorAll('.flag-choice')) {
              t.disabled = true;
            }
            feedbackEl.textContent = '';
            correctCount++;
            updateStatus();
            const nextQ = quiz.next();
            if (!nextQ) {
              setTimeout(showResult, 500);
            } else {
              setTimeout(() => render(nextQ), 500);
            }
          } else {
            tile.classList.add('wrong');
            tile.disabled = true;
            feedbackEl.textContent = chosen.name;
            wrongCount++;
            updateStatus();
          }
        }

        function showResult() {
          finalScoreEl.textContent = score();
          finalTargetEl.textContent = target;
          gameEl.hidden = true;
          resultEl.hidden = false;
        }

        playAgainEl.href = window.location.pathname + window.location.search;

        gameEl.hidden = false;
        updateStatus();
        render(quiz.next());
      }
    </script>
  </body>
</html>
