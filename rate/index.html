<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Country Rating Tool</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="index.css?v=__BUILD__" />
  </head>
  <body>
    <main class="rate-shell">
      <header class="rate-top">
        <h1 class="rate-title">Rate countries</h1>
        <p class="rate-progress">
          <span id="rate-rated-count">0</span> / <span id="rate-total-count">0</span> rated
        </p>
        <p class="rate-help">1 = everyone knows · 6 = almost nobody knows</p>
      </header>

      <div class="rate-filters" id="rate-filters"></div>

      <ul class="rate-grid" id="rate-grid"></ul>

      <footer class="rate-footer">
        <button type="button" id="rate-export" class="rate-action-btn" disabled title="Rate all countries first">Export JSON</button>
        <button type="button" id="rate-reset" class="rate-action-btn rate-action-danger">Reset</button>
      </footer>
    </main>

    <script type="module">
      import { bootRate } from './page.js?v=__BUILD__';
      import { bootI18n } from '../i18n.js';
      // Boot i18n so countryName() returns the localized name based on the
      // user's stored language preference; no lang-toggle button here.
      bootI18n('../').then(() => bootRate());
    </script>
  </body>
</html>
