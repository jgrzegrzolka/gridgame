<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="dns-prefetch" href="//gridgame-ttt.jgrzegrzolka.partykit.dev" />
    <link rel="preload" href="../../flags/countries.json?v=__BUILD__" as="fetch" type="application/json" crossorigin />
    <title data-i18n="ttt9x9.title">Yet Another Quiz — 9×9 Flag Tic Tac Toe</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="../index.css?v=__BUILD__" />
    <link rel="stylesheet" href="../lobby.css?v=__BUILD__" />
  </head>
  <body>
    <a class="lang-toggle" id="lang-toggle" href="#"></a>
    <a class="flags-link" href="../../flagsdata/" aria-label="Browse flags" title="Browse flags" data-i18n-attr="aria-label:menu.flagsData,title:menu.flagsData"><span class="flags-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      data-label-open="Open menu"
      data-label-close="Close menu"
      data-i18n-attr="aria-label:menu.open,data-label-open:menu.open,data-label-close:menu.close"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? this.dataset.labelOpen : this.dataset.labelClose);
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li><a href="../" data-i18n="ttt.variant3x3">3×3</a></li>
        <li><a href="./" aria-current="page" data-i18n="ttt.variant9x9">9×9</a></li>
        <li class="menu-divider"><a class="menu-coffee" href="https://suppi.pl/jgrzegrzolka" target="_blank" rel="noopener noreferrer" data-i18n="coffee">Buy me a coffee</a></li>
      </ul>
    </nav>

    <section id="lobby" class="lobby" hidden>
      <button type="button" class="lobby-btn" id="create-room" data-i18n="ttt.createRoom">Create a new room</button>
      <p class="lobby-or" data-i18n="ttt.or">— or —</p>
      <form id="join-form" class="join-form">
        <input
          type="text"
          id="join-code"
          class="join-code"
          inputmode="text"
          autocomplete="off"
          autocapitalize="characters"
          spellcheck="false"
          maxlength="5"
          placeholder="ROOM CODE"
          data-i18n-attr="placeholder:ttt.roomCodePlaceholder"
        />
        <button type="submit" class="lobby-btn" data-i18n="ttt.join">Join</button>
      </form>
      <p class="lobby-error" id="lobby-error" hidden></p>
      <p class="lobby-or" data-i18n="ttt.or">— or —</p>
      <a class="lobby-btn" href="offline/" data-i18n="ttt.playOffline">Play on the same device</a>
      <div class="give-up-row">
        <a class="give-up" href="../../" data-i18n="menu.home">Home</a>
      </div>
    </section>

    <section id="game" class="online-game" hidden>
      <p class="room-line"><span class="room-text"><span data-i18n="ttt.room">Room</span> <strong id="room-code">-----</strong></span><button type="button" class="share-link" id="share-link" aria-label="Share link" data-i18n-attr="aria-label:ttt.shareLink" hidden><span class="share-icon" aria-hidden="true"></span></button></p>
      <p class="role-line"><span class="muted" data-i18n="ttt.youAre">You are</span> <span class="turn-badge" id="role-badge">?</span></p>
      <p class="status-line" id="status-line" data-i18n="ttt.waitingForOpponent">Waiting for opponent…</p>
      <table class="grid is-9x9">
        <thead>
          <tr>
            <th class="corner"></th>
            <th class="col-header" data-col="0" colspan="3"></th>
            <th class="col-header" data-col="1" colspan="3"></th>
            <th class="col-header" data-col="2" colspan="3"></th>
          </tr>
        </thead>
        <tbody id="grid-body"></tbody>
      </table>
      <div class="give-up-row">
        <button type="button" class="give-up" id="give-up" data-i18n="game.giveUp" hidden>Give up</button>
        <span class="give-up-sep" aria-hidden="true">·</span>
        <a class="give-up" href="../../" data-i18n="menu.home">Home</a>
      </div>
      <section id="result" hidden>
        <p class="final-score" id="final-score-line"><span id="final-score"></span></p>
        <p class="result-links">
          <button type="button" class="result-link" id="play-again" data-i18n="game.playAgain">Play again</button>
          ·
          <a href="../../" data-i18n="menu.home">Home</a>
        </p>
      </section>
    </section>

    <dialog id="zoom">
      <img alt="" />
      <p></p>
    </dialog>

    <div class="picker" id="picker" hidden>
      <div class="picker-backdrop" id="picker-backdrop"></div>
      <div class="picker-sheet" role="dialog" aria-modal="true" aria-labelledby="picker-cats">
        <header class="picker-header">
          <span class="picker-cats" id="picker-cats"></span>
          <button type="button" class="picker-close" id="picker-close" aria-label="Cancel" data-i18n="game.cancel" data-i18n-attr="aria-label:game.cancel">Cancel</button>
        </header>
        <input
          type="text"
          class="picker-input"
          id="picker-input"
          inputmode="text"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="Country name…"
          data-i18n-attr="placeholder:game.countryName"
        />
        <ul class="picker-suggestions" id="picker-suggestions"></ul>
      </div>
    </div>

    <script type="module">
      import { bootUltimateTicTacToeOnline } from './page.js';
      import { disableBurgerIfEmpty, wireBurgerDismiss } from '../../common.js';
      import { bootI18n, wireLangToggle } from '../../i18n.js';
      bootI18n('../../').then((lang) => {
        // Soft-reload mode keeps room/grid/picker/result intact across
        // a language switch; bootUltimateTicTacToeOnline wires a
        // `langchanged` listener that re-translates everything.
        wireLangToggle(lang, undefined, { softReload: true, base: '../../' });
        bootUltimateTicTacToeOnline();
        disableBurgerIfEmpty(
          document.querySelector('.burger'),
          document.querySelector('#burger-panel .menu'),
        );
        wireBurgerDismiss();
      });
    </script>
  </body>
</html>
