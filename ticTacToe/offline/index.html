<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" href="../../flags/countries.json?v=__BUILD__" as="fetch" type="application/json" crossorigin />
    <title data-i18n="ttt.offlineTitle">Yet Another Quiz — Offline Tic Tac Toe</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="../index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="lang-toggle" id="lang-toggle" href="#"></a>
    <a class="flags-link" href="../../flagsdata/" aria-label="Browse flags" title="Browse flags" data-i18n-attr="aria-label:menu.flagsData,title:menu.flagsData"><span class="flags-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      data-label-open="Open menu"
      data-label-close="Close menu"
      data-i18n-attr="aria-label:menu.open,data-label-open:menu.open,data-label-close:menu.close"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? this.dataset.labelOpen : this.dataset.labelClose);
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li><a href="./" aria-current="page" data-i18n="ttt.variant3x3">3×3</a></li>
        <li><a href="../9x9/offline/" data-i18n="ttt.variant9x9">9×9</a></li>
        <li class="menu-divider"><a class="menu-coffee" href="https://suppi.pl/jgrzegrzolka" target="_blank" rel="noopener noreferrer" data-i18n="coffee">Buy me a coffee</a></li>
      </ul>
    </nav>
    <div class="game">
      <p class="turn-line" id="turn-line"><span class="turn-badge o" id="turn-badge">O</span><span id="turn-text" data-i18n="ttt.toMove">to move</span></p>
      <table class="grid">
        <thead>
          <tr>
            <th class="corner">
              <button
                type="button"
                class="rules-btn"
                id="rules-btn"
                aria-label="How to play"
                title="How to play"
                data-i18n-attr="aria-label:ttt.rulesBtn,title:ttt.rulesBtn"
              >?</button>
            </th>
            <th class="col-header" data-col="0"></th>
            <th class="col-header" data-col="1"></th>
            <th class="col-header" data-col="2"></th>
          </tr>
        </thead>
        <tbody id="grid-body"></tbody>
      </table>
      <div class="actions-row">
        <a id="play-again-inline" href="#" data-i18n="game.playAgain">Play again</a>
        ·
        <button type="button" id="give-up" data-i18n="game.giveUp">Give up</button>
        ·
        <a href="../../" data-i18n="menu.home">Home</a>
      </div>
      <section id="result" hidden>
        <p class="final-score" id="final-score-line">
          <span id="final-score"></span>
        </p>
        <p class="result-links">
          <a id="play-again" href="#" data-i18n="game.playAgain">Play again</a>
          ·
          <a href="../../" data-i18n="menu.home">Home</a>
        </p>
      </section>
    </div>
    <dialog id="zoom">
      <img alt="" />
      <p></p>
    </dialog>

    <dialog id="rules-help" class="rules-help">
      <h2 data-i18n="ttt.rulesTitle">How to play</h2>
      <p data-i18n="ttt.rulesBody">Each cell sits on a row and a column. Pick a country whose flag matches both — for example, an "Asia" row and a "red" column needs a flag that is both Asian and red. First to line up three wins.</p>
      <button type="button" class="rules-close" id="rules-close" data-i18n="ttt.rulesClose">Got it</button>
    </dialog>
    <div class="picker" id="picker" hidden>
      <div class="picker-backdrop" id="picker-backdrop"></div>
      <div class="picker-sheet" role="dialog" aria-modal="true" aria-labelledby="picker-cats">
        <header class="picker-header">
          <span class="picker-cats" id="picker-cats"></span>
          <button type="button" class="picker-close" id="picker-close" aria-label="Cancel" data-i18n="game.cancel" data-i18n-attr="aria-label:game.cancel">Cancel</button>
        </header>
        <input
          type="text"
          class="picker-input"
          id="picker-input"
          inputmode="text"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="Country name…"
          data-i18n-attr="placeholder:game.countryName"
        />
        <ul class="picker-suggestions" id="picker-suggestions"></ul>
      </div>
    </div>
    <script type="module">
      import { bootTicTacToe } from './page.js';
      import { disableBurgerIfEmpty, wireBurgerDismiss, mountNicknameMenuItem, mountPrivacyMenuItem } from '../../common.js';
      import { bootI18n, wireLangToggle } from '../../i18n.js';
      bootI18n('../../').then((lang) => {
        // Soft-reload mode preserves the offline game state (grid,
        // picker, scoreboard) across a language switch.
        wireLangToggle(lang, undefined, { softReload: true, base: '../../' });
        bootTicTacToe();
        disableBurgerIfEmpty(
          document.querySelector('.burger'),
          document.querySelector('#burger-panel .menu'),
        );
        wireBurgerDismiss();
        mountNicknameMenuItem({
          rootEl: document.querySelector('#burger-panel .menu'),
          profileHref: '../../profile/',
        });
        mountPrivacyMenuItem({
          rootEl: document.querySelector('#burger-panel .menu'),
          privacyHref: '../../privacy/',
        });
      });
    </script>
  </body>
</html>
