<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Flags</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 24px;
        background: #fafafa;
        color: #1c1c1c;
      }
      h1 {
        font-size: 20px;
        font-weight: 500;
        margin: 0 0 4px;
      }
      .count {
        color: #666;
        font-size: 14px;
        margin: 0 0 20px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
        gap: 8px;
      }
      .flag {
        position: relative;
        aspect-ratio: 4 / 3;
        border: 1px solid #ddd;
        overflow: hidden;
        cursor: zoom-in;
      }
      .flag img {
        width: 100%;
        height: 100%;
        display: block;
      }
      .flag::after {
        content: attr(data-name);
        position: absolute;
        bottom: calc(100% + 4px);
        left: 50%;
        transform: translateX(-50%);
        background: #1c1c1c;
        color: #fff;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 80ms;
        z-index: 10;
      }
      .flag:hover::after {
        opacity: 1;
      }
      dialog#zoom {
        width: min(80vw, 320px);
        padding: 16px;
        border: none;
        border-radius: 0;
        outline: none;
        background: #fff;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
      dialog#zoom::backdrop {
        background: rgba(0, 0, 0, 0.6);
      }
      dialog#zoom img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #ddd;
      }
      dialog#zoom p {
        margin: 12px 0 0;
        text-align: center;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <h1>All Flags</h1>
    <p class="count" id="count">Loading…</p>
    <div class="grid" id="grid"></div>
    <dialog id="zoom">
      <img alt="" />
      <p></p>
    </dialog>
    <script>
      const zoom = document.getElementById('zoom');
      const zoomImg = zoom.querySelector('img');
      const zoomName = zoom.querySelector('p');
      function openZoom(c) {
        zoomImg.src = `../flags/svg/${c.code}.svg`;
        zoomImg.alt = c.name;
        zoomName.textContent = c.name;
        zoom.showModal();
      }
      zoom.addEventListener('click', (e) => {
        if (e.target === zoom) zoom.close();
      });

      fetch('../flags/countries.json')
        .then((r) => r.json())
        .then((countries) => {
          const grid = document.getElementById('grid');
          for (const c of countries) {
            const wrap = document.createElement('div');
            wrap.className = 'flag';
            wrap.dataset.name = c.name;
            wrap.addEventListener('click', () => openZoom(c));
            const img = document.createElement('img');
            img.src = `../flags/svg/${c.code}.svg`;
            img.alt = c.name;
            img.loading = 'lazy';
            wrap.appendChild(img);
            grid.appendChild(wrap);
          }
          document.getElementById('count').textContent = `${countries.length} flags`;
        })
        .catch((err) => {
          document.getElementById('count').textContent = 'Failed to load: ' + err.message;
        });
    </script>
  </body>
</html>
