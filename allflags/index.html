<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Flags</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 24px;
        background: #fafafa;
        color: #1c1c1c;
      }
      .continent, .other {
        margin-bottom: 32px;
      }
      .continent h2, .other h2 {
        font-size: 16px;
        font-weight: 500;
        margin: 0 0 12px;
        color: #1c1c1c;
      }
      .section-count {
        color: #999;
        font-weight: 400;
        font-size: 14px;
        margin-left: 6px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
        gap: 8px;
      }
      .flag {
        position: relative;
        aspect-ratio: 4 / 3;
        border: 1px solid #ddd;
        overflow: hidden;
        cursor: zoom-in;
      }
      .flag img {
        width: 100%;
        height: 100%;
        display: block;
      }
      .flag::after {
        content: attr(data-name);
        position: absolute;
        bottom: calc(100% + 4px);
        left: 50%;
        transform: translateX(-50%);
        background: #1c1c1c;
        color: #fff;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 80ms;
        z-index: 10;
      }
      .flag:hover::after {
        opacity: 1;
      }
      dialog#zoom {
        width: min(80vw, 320px);
        padding: 16px;
        border: none;
        border-radius: 0;
        outline: none;
        background: #fff;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        opacity: 0;
        transform: scaleX(0);
        transition: opacity 150ms ease,
                    transform 350ms cubic-bezier(0.4, 0, 0.2, 1),
                    overlay 350ms ease allow-discrete,
                    display 350ms ease allow-discrete;
      }
      dialog#zoom[open] {
        opacity: 1;
        transform: scaleX(1);
      }
      @starting-style {
        dialog#zoom[open] {
          opacity: 0;
          transform: scaleX(0);
        }
      }
      dialog#zoom::backdrop {
        background: rgba(0, 0, 0, 0);
        transition: background 200ms ease,
                    overlay 200ms ease allow-discrete,
                    display 200ms ease allow-discrete;
      }
      dialog#zoom[open]::backdrop {
        background: rgba(0, 0, 0, 0.6);
      }
      @starting-style {
        dialog#zoom[open]::backdrop {
          background: rgba(0, 0, 0, 0);
        }
      }
      dialog#zoom img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #ddd;
        box-sizing: border-box;
      }
      dialog#zoom p {
        margin: 12px 0 0;
        text-align: center;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div id="sections"></div>
    <dialog id="zoom">
      <img alt="" />
      <p></p>
    </dialog>
    <script type="module">
      import { CONTINENTS, splitByCategory, groupByContinent } from '../flags/group.js';

      const zoom = document.getElementById('zoom');
      const zoomImg = zoom.querySelector('img');
      const zoomName = zoom.querySelector('p');
      function openZoom(c) {
        zoomImg.src = `../flags/svg/${c.code}.svg`;
        zoomImg.alt = c.name;
        zoomName.textContent = c.name;
        zoom.showModal();
      }
      zoom.addEventListener('click', (e) => {
        if (e.target === zoom) zoom.close();
      });

      function flagTile(c) {
        const wrap = document.createElement('div');
        wrap.className = 'flag';
        wrap.dataset.name = c.name;
        wrap.addEventListener('click', () => openZoom(c));
        const img = document.createElement('img');
        img.src = `../flags/svg/${c.code}.svg`;
        img.alt = c.name;
        img.loading = 'lazy';
        wrap.appendChild(img);
        return wrap;
      }

      function renderSection(parent, title, items, className) {
        if (items.length === 0) return;
        const section = document.createElement('section');
        section.className = className;
        const h2 = document.createElement('h2');
        h2.textContent = title;
        const countSpan = document.createElement('span');
        countSpan.className = 'section-count';
        countSpan.textContent = items.length;
        h2.appendChild(countSpan);
        section.appendChild(h2);
        const grid = document.createElement('div');
        grid.className = 'grid';
        for (const c of items) grid.appendChild(flagTile(c));
        section.appendChild(grid);
        parent.appendChild(section);
      }

      fetch('../flags/countries.json')
        .then((r) => r.json())
        .then((all) => {
          const sections = document.getElementById('sections');
          const { countries, other } = splitByCategory(all);
          const byContinent = groupByContinent(countries);
          for (const continent of CONTINENTS) {
            renderSection(sections, continent, byContinent[continent], 'continent');
          }
          renderSection(sections, 'Other', other, 'other');
        })
        .catch((err) => {
          document.getElementById('sections').textContent = 'Failed to load: ' + err.message;
        });
    </script>
  </body>
</html>
