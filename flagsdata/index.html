<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Every country flag, filterable by status (UN member, observer, territory), continent, colors, and motifs (cross, animal, weapon, star). The full dataset behind the quizzes." />
    <link rel="canonical" href="https://yetanotherquiz.com/flagsdata/" />
    <link rel="preload" href="../flags/countries.json?v=__BUILD__" as="fetch" type="application/json" crossorigin />
    <title data-i18n="flagsdata.title">Yet Another Quiz — All Country Flags</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="../flags/flagMap.css?v=__BUILD__" />
    <link rel="stylesheet" href="index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="lang-toggle" id="lang-toggle" href="#"></a>
    <script>
      // Sync lang-flag paint — sets data-current before any module imports
      // start, so the toggle shows the flag with first paint instead of
      // after the i18n.js graph resolves. Pinned by chrome.test.js.
      (function () {
        var lang = null;
        try {
          var s = localStorage.getItem('gridgame.lang');
          if (s === 'en' || s === 'pl') lang = s;
        } catch (e) {}
        if (!lang) {
          var n = (navigator.language || '').toLowerCase().split('-')[0];
          lang = n === 'pl' ? 'pl' : 'en';
        }
        document.getElementById('lang-toggle').setAttribute('data-current', lang);
      })();
    </script>
    <span class="flags-link" aria-label="Browse flags" aria-disabled="true" role="link" data-i18n-attr="aria-label:menu.flagsData"><span class="flags-icon" aria-hidden="true"></span></span>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      data-label-open="Open menu"
      data-label-close="Close menu"
      data-i18n-attr="aria-label:menu.open,data-label-open:menu.open,data-label-close:menu.close"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? this.dataset.labelOpen : this.dataset.labelClose);
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li><a class="menu-coffee" href="https://suppi.pl/jgrzegrzolka" target="_blank" rel="noopener noreferrer" data-i18n="coffee">Buy me a coffee</a></li>
      </ul>
    </nav>
    <h1 class="sr-only">All country flags</h1>
    <div id="filter-bar"></div>
    <div id="sections"></div>
    <section id="flag-map-section" hidden aria-hidden="true"></section>
    <div class="actions-row">
      <a href="../" data-i18n="menu.home">Home</a>
    </div>
    <dialog id="zoom">
      <img alt="" />
      <p></p>
      <div class="country-facts" hidden></div>
      <pre class="country-data"></pre>
    </dialog>
    <script type="module">
      import { bootFlagsData } from './page.js';
      import { bootI18n, wireLangToggle } from '../i18n.js';
      import { wireBurgerDismiss, mountNicknameMenuItem } from '../common.js';
      // Filter labels are built synchronously inside bootFlagsData, so we
      // chain after bootI18n to make sure t() sees the loaded strings.
      bootI18n('../').then((lang) => {
        // Soft-reload keeps filter selections, scroll position, and the
        // open zoom dialog intact across a language switch. Pill labels
        // re-translate via a `langchanged` listener inside bootFlagsData;
        // static labels carry `data-i18n` and re-translate upstream.
        wireLangToggle(lang, undefined, { softReload: true, base: '../' });
        wireBurgerDismiss();
        mountNicknameMenuItem({
          rootEl: document.querySelector('#burger-panel .menu'),
          profileHref: '../profile/',
        });
        bootFlagsData();
      });
    </script>
  </body>
</html>
