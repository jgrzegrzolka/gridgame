<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Flags data</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="back" href="../" aria-label="Home"><span class="home-icon" aria-hidden="true"></span></a>
    <div id="sections"></div>
    <dialog id="zoom">
      <img alt="" />
      <p></p>
      <pre class="country-data"></pre>
    </dialog>
    <script type="module">
      import { CONTINENTS, splitByCategory, groupByContinent } from '../flags/group.js?v=__BUILD__';

      const zoom = document.getElementById('zoom');
      const zoomImg = zoom.querySelector('img');
      const zoomName = zoom.querySelector('p');
      const zoomData = zoom.querySelector('.country-data');
      function openZoom(c) {
        zoomImg.src = `../flags/svg/${c.code}.svg`;
        zoomImg.alt = c.name;
        zoomName.textContent = c.name;
        zoomData.textContent = JSON.stringify(c, null, 2);
        zoom.showModal();
      }
      zoom.addEventListener('click', (e) => {
        if (e.target === zoom) zoom.close();
      });

      function flagTile(c) {
        const wrap = document.createElement('div');
        wrap.className = 'flag';
        wrap.dataset.name = c.name;
        wrap.addEventListener('click', () => openZoom(c));
        const img = document.createElement('img');
        img.src = `../flags/svg/${c.code}.svg`;
        img.alt = c.name;
        img.loading = 'lazy';
        wrap.appendChild(img);
        return wrap;
      }

      function renderSection(parent, title, items, className) {
        if (items.length === 0) return;
        const section = document.createElement('section');
        section.className = className;
        const h2 = document.createElement('h2');
        h2.textContent = title;
        const countSpan = document.createElement('span');
        countSpan.className = 'section-count';
        countSpan.textContent = items.length;
        h2.appendChild(countSpan);
        section.appendChild(h2);
        const grid = document.createElement('div');
        grid.className = 'grid';
        for (const c of items) grid.appendChild(flagTile(c));
        section.appendChild(grid);
        parent.appendChild(section);
      }

      fetch('../flags/countries.json')
        .then((r) => r.json())
        .then((all) => {
          const sections = document.getElementById('sections');
          const { countries, other } = splitByCategory(all);
          const byContinent = groupByContinent(countries);
          for (const continent of CONTINENTS) {
            renderSection(sections, continent, byContinent[continent], 'continent');
          }
          renderSection(sections, 'Other', other, 'other');
        })
        .catch((err) => {
          document.getElementById('sections').textContent = 'Failed to load: ' + err.message;
        });
    </script>
  </body>
</html>
