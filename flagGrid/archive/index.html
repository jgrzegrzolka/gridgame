<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Flag Grid — Previous games</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="../index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="back" href="../../" aria-label="Home" data-i18n-attr="aria-label:back"><span class="home-icon" aria-hidden="true"></span></a>
    <a class="coffee" href="https://suppi.pl/jgrzegrzolka" target="_blank" rel="noopener noreferrer" aria-label="Buy me a coffee" title="Buy me a coffee" data-i18n-attr="aria-label:coffee,title:coffee"><span class="coffee-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      data-label-open="Open menu"
      data-label-close="Close menu"
      data-i18n-attr="aria-label:menu.open,data-label-open:menu.open,data-label-close:menu.close"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? this.dataset.labelOpen : this.dataset.labelClose);
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li><a href="../2/" data-i18n="menu.today">Today</a></li>
        <li><a href="../archive/" data-i18n="menu.previousGames">Previous games</a></li>
        <li><a href="../rand/" data-i18n="menu.random">Random</a></li>
        <li class="menu-divider"><a href="../../flagsdata/" data-i18n="menu.flagsData">Flags data</a></li>
        <li class="menu-divider"><a href="#" id="lang-toggle">Polski</a></li>
      </ul>
    </nav>
    <div class="archive-grid" id="archive-grid"></div>
    <script type="module">
      import { ARCHIVE } from '../puzzles.js?v=__BUILD__';
      import { loadGridState, computeGridScore, isGridLocked } from '../../flags/grid.js?v=__BUILD__';
      import { scoreColor } from '../../flags/quiz.js?v=__BUILD__';
      import { bootI18n, wireLangToggle } from '../../i18n.js?v=__BUILD__';

      bootI18n('../../').then(wireLangToggle);

      const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      function formatDate(iso) {
        const [, m, d] = iso.split('-').map(Number);
        return `${MONTHS[m - 1]} ${d}`;
      }

      const gridEl = document.getElementById('archive-grid');
      for (const entry of ARCHIVE) {
        const a = document.createElement('a');
        a.href = `../${entry.slug}/`;
        a.className = 'archive-tile';

        const num = document.createElement('div');
        num.className = 'archive-tile-num';
        num.textContent = `#${entry.slug}`;
        a.appendChild(num);

        const dateEl = document.createElement('div');
        dateEl.className = 'archive-tile-date';
        dateEl.textContent = formatDate(entry.date);
        a.appendChild(dateEl);

        // Only show a score when the round was actually played to
        // completion (solved or gave up). An in-progress save (state
        // exists but isGridLocked is false) leaves the tile bare.
        const state = loadGridState(globalThis.localStorage, `flaggrid.state.${entry.slug}`);
        if (state && isGridLocked(state)) {
          const filledCount = state.picks.filter((p) => p !== null).length;
          const score = computeGridScore({ filledCount, wrongCount: state.wrongCount });
          const scoreEl = document.createElement('div');
          scoreEl.className = 'archive-tile-score';
          scoreEl.textContent = String(score);
          scoreEl.style.color = scoreColor(score / 100);
          a.appendChild(scoreEl);
        }

        gridEl.appendChild(a);
      }
    </script>
  </body>
</html>
