<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Flag Grid — Game 1</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg?v=__BUILD__" />
    <link rel="stylesheet" href="../../common.css?v=__BUILD__" />
    <link rel="stylesheet" href="../index.css?v=__BUILD__" />
  </head>
  <body>
    <a class="back" href="../../" aria-label="Home"><span class="home-icon" aria-hidden="true"></span></a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? 'Open menu' : 'Close menu');
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li><a href="../1/">Current</a></li>
        <li><a href="../archive/">Archive</a></li>
        <li><a href="../rand/">Random</a></li>
        <li class="menu-divider"><a href="../../" aria-label="Home"><span class="home-icon" aria-hidden="true"></span></a></li>
      </ul>
    </nav>
    <p class="play-timer" id="play-timer-line"><span id="play-time">0:00.000</span></p>
    <table class="grid">
      <thead>
        <tr>
          <th class="corner"></th>
          <th class="col-header" data-col="0"></th>
          <th class="col-header" data-col="1"></th>
          <th class="col-header" data-col="2"></th>
        </tr>
      </thead>
      <tbody id="grid-body"></tbody>
    </table>
    <div class="below-grid">
      <button type="button" class="give-up" id="give-up">Give up</button>
    </div>
    <div id="result" class="result" hidden>
      <p class="final-score" id="final-score-line">
        Your score: <span id="final-score">0</span>
      </p>
      <p class="time" id="time"></p>
      <p class="result-links">
        <a id="play-again" href="#">Play again</a>
      </p>
    </div>
    <ul class="suggestions" id="suggestions" hidden></ul>
    <script type="module">
      import { bootFlagGrid } from '../page.js?v=__BUILD__';
      import { PUZZLE_1 } from '../puzzles.js?v=__BUILD__';

      bootFlagGrid(() => PUZZLE_1, { stateKey: 'flaggrid.state.1', allowReplay: true });
    </script>
  </body>
</html>
