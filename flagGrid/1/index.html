<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flag Grid — Game 1</title>
    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="../index.css" />
  </head>
  <body>
    <a class="back" href="../../" aria-label="Back">←</a>
    <button
      type="button"
      class="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="burger-panel"
      onclick="
        const open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.setAttribute('aria-label', open ? 'Open menu' : 'Close menu');
        document.getElementById('burger-panel').hidden = open;
      "
    >
      <span class="burger-bars" aria-hidden="true"></span>
    </button>
    <nav id="burger-panel" class="burger-panel" hidden>
      <ul class="menu">
        <li><a href="../1/">Game 1</a></li>
        <li><a href="../rand/">Random</a></li>
      </ul>
    </nav>
    <p class="status" id="status"></p>
    <table class="grid">
      <thead>
        <tr>
          <th class="corner"></th>
          <th class="col-header" data-col="0"></th>
          <th class="col-header" data-col="1"></th>
          <th class="col-header" data-col="2"></th>
        </tr>
      </thead>
      <tbody id="grid-body"></tbody>
    </table>
    <dialog id="picker">
      <input type="text" id="picker-input" autocomplete="off" />
      <ul class="suggestions" id="suggestions"></ul>
    </dialog>
    <script type="module">
      import { bootFlagGrid } from '../page.js';
      import { PUZZLE_1 } from '../puzzles.js';

      bootFlagGrid(() => PUZZLE_1);
    </script>
  </body>
</html>
