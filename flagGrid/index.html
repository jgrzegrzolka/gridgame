<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flag Grid</title>
    <link rel="stylesheet" href="../common.css" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <a class="back" href="../" aria-label="Back">←</a>
    <p class="status" id="status"></p>
    <table class="grid">
      <thead>
        <tr>
          <th class="corner"></th>
          <th class="col-header" data-col="0"></th>
          <th class="col-header" data-col="1"></th>
          <th class="col-header" data-col="2"></th>
        </tr>
      </thead>
      <tbody id="grid-body"></tbody>
    </table>
    <dialog id="picker">
      <input type="text" id="picker-input" autocomplete="off" />
      <ul class="suggestions" id="suggestions"></ul>
    </dialog>
    <script type="module">
      import {
        tryPick,
        continent,
        nameStartsWith,
        suggest,
      } from '../flags/grid.js';

      const puzzle = {
        rows: [continent('Europe'), continent('Asia'), continent('Africa')],
        cols: [nameStartsWith('A'), nameStartsWith('B'), nameStartsWith('C')],
      };

      /** @type {(import('../flags/group.js').Country | null)[][]} */
      let solution = [
        [null, null, null],
        [null, null, null],
        [null, null, null],
      ];

      /** @type {import('../flags/group.js').Country[]} */
      let allCountries = [];
      /** @type {{ row: number, col: number } | null} */
      let activeCell = null;
      /** @type {import('../flags/group.js').Country | null} */
      let topMatch = null;

      const statusEl = document.getElementById('status');
      const gridBodyEl = document.getElementById('grid-body');
      const pickerEl = document.getElementById('picker');
      const pickerInputEl = document.getElementById('picker-input');
      const suggestionsEl = document.getElementById('suggestions');
      const colHeaderEls = document.querySelectorAll('.col-header');

      // Render column headers from the puzzle.
      colHeaderEls.forEach((th, i) => {
        th.textContent = puzzle.cols[i].label;
      });

      // Build the row structure once; renderGrid() repopulates cell contents.
      for (let r = 0; r < 3; r++) {
        const tr = document.createElement('tr');
        const rowHeader = document.createElement('th');
        rowHeader.textContent = puzzle.rows[r].label;
        tr.appendChild(rowHeader);
        for (let c = 0; c < 3; c++) {
          const td = document.createElement('td');
          td.className = 'cell';
          td.dataset.row = String(r);
          td.dataset.col = String(c);
          td.addEventListener('click', () => openPicker(r, c));
          tr.appendChild(td);
        }
        gridBodyEl.appendChild(tr);
      }

      fetch('../flags/countries.json')
        .then((r) => r.json())
        .then((all) => {
          allCountries = all;
          renderGrid();
        })
        .catch((err) => {
          statusEl.textContent = 'Failed to load: ' + err.message;
        });

      function openPicker(row, col) {
        activeCell = { row, col };
        pickerInputEl.value = '';
        suggestionsEl.innerHTML = '';
        topMatch = null;
        const td = gridBodyEl.querySelector(
          `td[data-row="${row}"][data-col="${col}"]`,
        );
        const rect = td.getBoundingClientRect();
        pickerEl.style.top = rect.top + 'px';
        pickerEl.style.left = rect.left + 'px';
        pickerEl.style.width = rect.width + 'px';
        pickerEl.show();
        pickerInputEl.focus();
      }

      pickerInputEl.addEventListener('input', () => {
        suggestionsEl.innerHTML = '';
        const matches = suggest(allCountries, pickerInputEl.value);
        topMatch = matches[0] ?? null;
        for (const country of matches) {
          const li = document.createElement('li');
          const img = document.createElement('img');
          img.src = `../flags/svg/${country.code}.svg`;
          img.alt = '';
          li.appendChild(img);
          const name = document.createElement('span');
          name.textContent = country.name;
          li.appendChild(name);
          li.addEventListener('click', () => pickCountry(country));
          suggestionsEl.appendChild(li);
        }
      });

      pickerInputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && topMatch) {
          e.preventDefault();
          pickCountry(topMatch);
        }
      });

      document.addEventListener('click', (e) => {
        if (!pickerEl.open) return;
        if (pickerEl.contains(e.target)) return;
        // Clicks on cells reopen the picker via their own handler; let them.
        if (e.target.closest('.cell')) return;
        pickerEl.close();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && pickerEl.open) pickerEl.close();
      });

      function pickCountry(country) {
        if (!activeCell) return;
        const { row, col } = activeCell;
        const result = tryPick(puzzle, solution, row, col, country);
        pickerEl.close();
        if (!result.accepted) {
          shakeCell(row, col);
          return;
        }
        solution = result.solution;
        renderGrid();
      }

      function shakeCell(row, col) {
        const td = gridBodyEl.querySelector(
          `td[data-row="${row}"][data-col="${col}"]`,
        );
        td.classList.remove('shake');
        // Force reflow so re-adding the class restarts the animation
        // even if it was already running.
        void td.offsetWidth;
        td.classList.add('shake');
      }

      function renderGrid() {
        let filledCount = 0;
        for (let r = 0; r < 3; r++) {
          for (let c = 0; c < 3; c++) {
            const td = /** @type {HTMLTableCellElement} */ (
              gridBodyEl.querySelector(`td[data-row="${r}"][data-col="${c}"]`)
            );
            td.className = 'cell';
            td.innerHTML = '';
            const country = solution[r][c];
            if (!country) {
              td.textContent = '+';
              continue;
            }
            filledCount++;
            td.classList.add('filled');
            const img = document.createElement('img');
            img.src = `../flags/svg/${country.code}.svg`;
            img.alt = country.name;
            td.appendChild(img);
          }
        }
        if (filledCount === 9) {
          statusEl.textContent = 'Solved!';
          statusEl.classList.add('complete');
        } else {
          statusEl.textContent = '';
          statusEl.classList.remove('complete');
        }
      }
    </script>
  </body>
</html>
